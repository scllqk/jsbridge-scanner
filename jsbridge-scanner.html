<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSBridge Scanner</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #eee;
            --text-secondary: #888;
            --accent: #00d4ff;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题 */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--accent);
            font-weight: 700;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        /* 统计卡片 */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-secondary);
            padding: 16px 10px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .count {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }
        .stat-box .label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .stat-box.high .count { color: var(--danger); }
        .stat-box.medium .count { color: var(--warning); }
        .stat-box.safe .count { color: var(--success); }

        /* 筛选按钮 */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            flex: 1;
            min-width: 70px;
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .filter-btn.all { background: var(--accent); color: #000; }
        .filter-btn.high { background: var(--danger); color: #fff; }
        .filter-btn.medium { background: var(--warning); color: #000; }
        .filter-btn.safe { background: var(--success); color: #000; }
        .filter-btn:active { transform: scale(0.95); }

        /* 结果列表 */
        .results { margin-bottom: 30px; }
        .object-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .object-header {
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .object-header:active { background: var(--bg-tertiary); }
        .object-name {
            font-weight: 600;
            font-size: 17px;
        }
        .object-type {
            color: var(--text-secondary);
            font-size: 13px;
            margin-left: 8px;
        }
        .risk-badge {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: bold;
        }
        .risk-badge.high { background: var(--danger); color: #fff; }
        .risk-badge.medium { background: var(--warning); color: #000; }
        .risk-badge.safe { background: var(--success); color: #000; }

        .object-body {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid var(--bg-tertiary);
        }
        .object-item.expanded .object-body { display: block; }
        .property {
            padding: 10px 0;
            border-bottom: 1px solid var(--bg-tertiary);
            font-family: "SF Mono", Consolas, monospace;
            font-size: 14px;
        }
        .property:last-child { border-bottom: none; }
        .property-type { color: var(--accent); margin-right: 8px; }
        .property-name.high { color: var(--danger); }
        .property-name.medium { color: var(--warning); }
        .property-name.safe { color: var(--success); }

        .arrow {
            font-size: 12px;
            transition: transform 0.2s;
            margin-left: 8px;
        }
        .object-item.expanded .arrow { transform: rotate(180deg); }

        .no-results {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 15px;
        }

        /* 发现的接口高亮区域 */
        .found-interfaces {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid var(--danger);
        }
        .found-interfaces h2 {
            margin: 0 0 16px 0;
            color: var(--danger);
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .found-interfaces h2::before {
            content: "⚠️";
        }
        .found-count {
            background: var(--danger);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 14px;
            margin-left: auto;
        }

        .interface-category {
            margin-bottom: 16px;
        }
        .interface-category:last-child { margin-bottom: 0; }
        .category-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--bg-tertiary);
        }
        .interface-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .interface-tag {
            background: linear-gradient(135deg, var(--danger), #ff6b81);
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            animation: pulse 2s infinite;
        }
        .interface-tag::before {
            content: "✓";
            font-weight: bold;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255, 71, 87, 0); }
        }

        /* 常见接口检测 - 手机优化 */
        .feature-tests { margin-top: 30px; }
        .feature-tests h2 {
            font-size: 18px;
            color: var(--accent);
            margin: 0 0 16px 0;
        }
        .test-category {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .test-category-header {
            padding: 14px 16px;
            background: var(--bg-tertiary);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .test-category-header:active { opacity: 0.8; }
        .category-found-count {
            background: var(--danger);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .test-category-body {
            display: none;
            padding: 12px 16px;
        }
        .test-category.expanded .test-category-body { display: block; }
        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--bg-tertiary);
            font-size: 15px;
        }
        .test-item:last-child { border-bottom: none; }
        .test-name { color: var(--text-primary); word-break: break-all; }
        .test-result {
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 10px;
        }
        .test-result.found {
            background: var(--danger);
            color: #fff;
        }
        .test-result.notfound {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container { padding: 16px; }
            .header h1 { font-size: 24px; }
            .stats { gap: 8px; }
            .stat-box { padding: 12px 8px; }
            .stat-box .count { font-size: 26px; }
            .stat-box .label { font-size: 12px; }
            .filter-btn { padding: 14px 8px; font-size: 14px; }
            .object-header { padding: 14px; }
            .object-name { font-size: 16px; }
            .found-interfaces { padding: 16px; }
            .interface-tag { padding: 10px 16px; font-size: 15px; }
            .test-item { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>JSBridge Scanner</h1>
            <p>检测 WebView 中注入的 JS-Native 接口</p>
        </div>

        <div class="stats">
            <div class="stat-box high">
                <span class="count" id="high-count">0</span>
                <span class="label">高风险</span>
            </div>
            <div class="stat-box medium">
                <span class="count" id="medium-count">0</span>
                <span class="label">中风险</span>
            </div>
            <div class="stat-box safe">
                <span class="count" id="safe-count">0</span>
                <span class="label">安全</span>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn all" onclick="filterResults('all')">全部</button>
            <button class="filter-btn high" onclick="filterResults('high')">高风险</button>
            <button class="filter-btn medium" onclick="filterResults('medium')">中风险</button>
            <button class="filter-btn safe" onclick="filterResults('safe')">安全</button>
        </div>

        <div class="results" id="results"></div>

        <!-- 发现的接口高亮展示 -->
        <div class="found-interfaces" id="found-interfaces" style="display:none;">
            <h2>发现可疑接口 <span class="found-count" id="found-count">0</span></h2>
            <div id="found-list"></div>
        </div>

        <div class="feature-tests">
            <h2>常见接口检测</h2>
            <div id="feature-tests-results"></div>
        </div>
    </div>

    <script>
    (function() {
        // ========== 浏览器原生对象白名单 ==========
        const BROWSER_WHITELIST = [
            "window", "document", "location", "navigator", "history", "screen",
            "parent", "top", "self", "frames", "length", "closed", "opener",
            "name", "origin", "outerHeight", "outerWidth", "innerHeight", "innerWidth",
            "screenX", "screenY", "screenLeft", "screenTop", "devicePixelRatio",
            "alert", "confirm", "prompt", "print", "focus", "blur", "close",
            "postMessage", "open", "setTimeout", "clearTimeout", "setInterval", "clearInterval",
            "requestAnimationFrame", "cancelAnimationFrame", "requestIdleCallback", "cancelIdleCallback",
            "fetch", "XMLHttpRequest", "WebSocket", "EventSource",
            "btoa", "atob", "queueMicrotask", "getComputedStyle", "matchMedia",
            "scroll", "scrollTo", "scrollBy", "scrollX", "scrollY", "pageXOffset", "pageYOffset",
            "moveTo", "moveBy", "resizeTo", "resizeBy", "getSelection", "find", "stop",
            "captureEvents", "releaseEvents", "addEventListener", "removeEventListener", "dispatchEvent",
            "localStorage", "sessionStorage", "indexedDB", "cookieStore", "caches",
            "crypto", "Crypto", "CryptoKey", "SubtleCrypto",
            "Node", "Element", "HTMLElement", "Document", "DocumentFragment",
            "Event", "CustomEvent", "MouseEvent", "KeyboardEvent", "TouchEvent",
            "Attr", "CharacterData", "Text", "Comment", "DOMTokenList",
            "NodeList", "HTMLCollection", "DOMStringList", "DOMStringMap",
            "Object", "Function", "Array", "String", "Number", "Boolean",
            "Symbol", "BigInt", "Math", "Date", "RegExp", "Error",
            "TypeError", "SyntaxError", "ReferenceError", "RangeError", "URIError",
            "JSON", "Promise", "Proxy", "Reflect", "Map", "Set", "WeakMap", "WeakSet",
            "ArrayBuffer", "DataView", "Int8Array", "Uint8Array", "Float32Array",
            "URL", "URLSearchParams", "Blob", "File", "FileReader", "FileList",
            "FormData", "Headers", "Request", "Response",
            "Image", "ImageBitmap", "createImageBitmap",
            "Audio", "AudioContext", "Canvas", "CanvasRenderingContext2D",
            "performance", "Performance", "PerformanceTiming",
            "IntersectionObserver", "MutationObserver", "ResizeObserver",
            "AbortController", "AbortSignal", "Notification", "Permissions", "Geolocation",
            "Worker", "SharedWorker", "ServiceWorker",
            "BroadcastChannel", "MessageChannel", "MessagePort",
            "console", "chrome", "browser", "speechSynthesis",
            "visualViewport", "styleMedia", "clientInformation", "external",
            "attr_list", "attr", "obj", "TEMPORARY", "PERSISTENT",
            "openDatabase", "webkitRequestFileSystem", "webkitResolveLocalFileSystemURL"
        ];

        // ========== 风险关键词 ==========
        const RISK_KEYWORDS = {
            high: ["install", "download", "apk", "apkinstall", "installapk", "exec", "execute", "shell", "cmd", "command", "eval", "delete", "remove", "format", "wipe", "factoryreset", "sendsms", "sms", "call", "dial", "phone", "pay", "payment", "alipay", "wechatpay", "login", "logout", "register", "signin", "signup", "root", "su", "superuser", "jailbreak"],
            medium: ["open", "start", "launch", "intent", "activity", "package", "getdevice", "device", "imei", "imsi", "meid", "mac", "serial", "androidid", "udid", "uuid", "idfa", "idfv", "location", "geolocation", "getlocation", "position", "gps", "contact", "contacts", "addressbook", "camera", "photo", "video", "audio", "record", "microphone", "file", "readfile", "writefile", "save", "load", "clipboard", "paste", "copy", "notification", "push", "network", "wifi", "bluetooth", "nfc", "webview", "browser", "storage", "database", "sqlite", "db", "fingerprint", "faceid", "touchid", "biometric"]
        };

        function checkRisk(name) {
            const lower = name.toLowerCase();
            for (const keyword of RISK_KEYWORDS.high) if (lower.includes(keyword)) return "high";
            for (const keyword of RISK_KEYWORDS.medium) if (lower.includes(keyword)) return "medium";
            return "safe";
        }

        // ========== 扫描 window 对象 ==========
        const results = [];
        const foundObjects = [];
        for (const key in window) {
            if (BROWSER_WHITELIST.includes(key)) continue;
            if (key.startsWith("on") && typeof window[key] === "function") continue;
            if (key.startsWith("webkit") || key.startsWith("WebKit")) continue;

            const obj = window[key];
            const objType = typeof obj;
            const risk = checkRisk(key);
            const properties = [];

            if (obj && (objType === "object" || objType === "function")) {
                try {
                    for (const prop in obj) {
                        properties.push({ name: prop, type: typeof obj[prop], risk: checkRisk(prop) });
                    }
                } catch (e) {}
            }

            const item = { name: key, type: objType, risk: risk, properties: properties };
            results.push(item);

            // 收集高风险和中风险对象
            if (risk === "high" || risk === "medium") {
                foundObjects.push(item);
            }
        }

        // ========== 统计 ==========
        const counts = { high: 0, medium: 0, safe: 0 };
        results.forEach(r => counts[r.risk]++);
        document.getElementById("high-count").textContent = counts.high;
        document.getElementById("medium-count").textContent = counts.medium;
        document.getElementById("safe-count").textContent = counts.safe;

        // ========== 渲染发现的接口（高亮） ==========
        if (foundObjects.length > 0) {
            const foundDiv = document.getElementById("found-interfaces");
            document.getElementById("found-count").textContent = foundObjects.length;
            document.getElementById("found-list").innerHTML = foundObjects.map(item => `
                <div class="interface-tag">${item.name}</div>
            `).join("");
            foundDiv.style.display = "block";
        }

        // ========== 渲染对象列表 ==========
        function renderResults(filter = "all") {
            const container = document.getElementById("results");
            const filtered = filter === "all" ? results : results.filter(r => r.risk === filter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">没有找到匹配的对象</div>';
                return;
            }

            container.innerHTML = filtered.map((item, index) => `
                <div class="object-item" data-index="${index}">
                    <div class="object-header" onclick="toggleExpand(this)">
                        <div>
                            <span class="object-name ${item.risk}">${item.name}</span>
                            <span class="object-type">${item.type}</span>
                        </div>
                        <div>
                            <span class="risk-badge ${item.risk}">${item.risk.toUpperCase()}</span>
                            <span class="arrow">▼</span>
                        </div>
                    </div>
                    <div class="object-body">
                        ${item.properties.length === 0
                            ? '<div style="color:#888;padding:10px;">无子属性</div>'
                            : item.properties.map(p => `
                                <div class="property">
                                    <span class="property-type">${p.type}</span>
                                    <span class="property-name ${p.risk}">${p.name}</span>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `).join("");
        }

        window.toggleExpand = function(header) {
            header.parentElement.classList.toggle("expanded");
        };

        window.filterResults = function(filter) {
            renderResults(filter);
        };

        renderResults();

        // ========== 常见接口检测（按类别） ==========
        const FEATURE_CATEGORIES = {
            "下载/APK": [
                { name: "DownLoadApkManager.isApkInstalled", check: () => window.DownLoadApkManager?.isApkInstalled },
                { name: "DownLoadApkManager.showDownloadView", check: () => window.DownLoadApkManager?.showDownloadView },
                { name: "DownLoadApkManager.downloadApk", check: () => window.DownLoadApkManager?.downloadApk },
                { name: "downloadApk", check: () => window.downloadApk },
                { name: "installApk", check: () => window.installApk }
            ],
            "通用桥接": [
                { name: "JSBridge", check: () => window.JSBridge },
                { name: "WebViewBridge", check: () => window.WebViewBridge },
                { name: "WebviewBridge", check: () => window.WebviewBridge },
                { name: "androidJsBridge", check: () => window.androidJsBridge },
                { name: "AndroidBridge", check: () => window.AndroidBridge },
                { name: "appBridge", check: () => window.appBridge },
                { name: "nativeBridge", check: () => window.nativeBridge }
            ],
            "社交/视频": [
                { name: "biliInject.postMessage (B站)", check: () => window.biliInject?.postMessage },
                { name: "toutiaoJSBridge (抖音)", check: () => window.toutiaoJSBridge },
                { name: "ttJSBridge", check: () => window.ttJSBridge },
                { name: "qqJSBridge", check: () => window.qqJSBridge },
                { name: "ksJSBridge (快手)", check: () => window.ksJSBridge }
            ],
            "支付": [
                { name: "WeixinJSBridge (微信)", check: () => window.WeixinJSBridge },
                { name: "AlipayJSBridge (支付宝)", check: () => window.AlipayJSBridge }
            ],
            "厂商桥接": [
                { name: "huaweiJsBridge (华为)", check: () => window.huaweiJsBridge },
                { name: "HMSCore", check: () => window.HMSCore },
                { name: "miuiJsBridge (小米)", check: () => window.miuiJsBridge },
                { name: "oppoJsBridge", check: () => window.oppoJsBridge },
                { name: "vivoJsBridge", check: () => window.vivoJsBridge },
                { name: "BdboxJsBridge (百度)", check: () => window.BdboxJsBridge }
            ],
            "其他应用": [
                { name: "MeituanJsBridge (美团)", check: () => window.MeituanJsBridge },
                { name: "jdJsBridge (京东)", check: () => window.jdJsBridge },
                { name: "OtherJSPlugin", check: () => window.OtherJSPlugin }
            ],
            "腾讯系": [
                { name: "tbs_jsbridge", check: () => window.tbs_jsbridge },
                { name: "tbs_bridge", check: () => window.tbs_bridge }
            ],
            "存储/Cookie": [
                { name: "cookieStore", check: () => window.cookieStore }
            ]
        };

        const testsContainer = document.getElementById("feature-tests-results");

        // 按类别渲染，存在的接口排在前面
        let html = "";
        for (const [category, tests] of Object.entries(FEATURE_CATEGORIES)) {
            const results2 = tests.map(t => ({
                name: t.name,
                found: !!t.check()
            }));

            const foundCount = results2.filter(t => t.found).length;

            html += `
                <div class="test-category" onclick="toggleCategory(this)">
                    <div class="test-category-header">
                        <span>${category}</span>
                        ${foundCount > 0 ? `<span class="category-found-count">${foundCount}</span>` : ''}
                    </div>
                    <div class="test-category-body">
                        ${results2.map(t => `
                            <div class="test-item">
                                <span class="test-name">${t.name}</span>
                                <span class="test-result ${t.found ? 'found' : 'notfound'}">${t.found ? '存在' : '不存在'}</span>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `;
        }
        testsContainer.innerHTML = html;

        window.toggleCategory = function(el) {
            el.classList.toggle("expanded");
        };

    })();
    </script>
</body>
</html>
