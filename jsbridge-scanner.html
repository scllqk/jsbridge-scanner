<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSBridge Scanner</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #eee;
            --text-secondary: #888;
            --accent: #00d4ff;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { margin: 0; font-size: 28px; color: var(--accent); font-weight: 700; }
        .header p { color: var(--text-secondary); font-size: 14px; margin-top: 8px; }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-secondary);
            padding: 16px 10px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .count { font-size: 32px; font-weight: bold; display: block; }
        .stat-box .label { font-size: 13px; color: var(--text-secondary); }
        .stat-box.high .count { color: var(--danger); }
        .stat-box.medium .count { color: var(--warning); }
        .stat-box.safe .count { color: var(--success); }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-btn {
            flex: 1;
            padding: 14px 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .filter-btn.all { background: var(--accent); color: #000; }
        .filter-btn.high { background: var(--danger); color: #fff; }
        .filter-btn.medium { background: var(--warning); color: #000; }
        .filter-btn.safe { background: var(--success); color: #000; }
        .filter-btn:active { transform: scale(0.95); }

        .results { margin-bottom: 30px; }
        .object-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .object-header {
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .object-header:active { background: var(--bg-tertiary); }
        .object-name { font-weight: 600; font-size: 17px; }
        .object-type { color: var(--text-secondary); font-size: 13px; margin-left: 8px; }
        .risk-badge {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: bold;
        }
        .risk-badge.high { background: var(--danger); color: #fff; }
        .risk-badge.medium { background: var(--warning); color: #000; }
        .risk-badge.safe { background: var(--success); color: #000; }

        .object-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--bg-tertiary); }
        .object-item.expanded .object-body { display: block; }
        .property {
            padding: 10px 0;
            border-bottom: 1px solid var(--bg-tertiary);
            font-family: "SF Mono", Consolas, monospace;
            font-size: 14px;
        }
        .property:last-child { border-bottom: none; }
        .property-type { color: var(--accent); margin-right: 8px; }
        .property-name.high { color: var(--danger); }
        .property-name.medium { color: var(--warning); }
        .property-name.safe { color: var(--success); }

        .arrow { font-size: 12px; transition: transform 0.2s; margin-left: 8px; }
        .object-item.expanded .arrow { transform: rotate(180deg); }

        .no-results { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 15px; }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .header h1 { font-size: 24px; }
            .stats { gap: 8px; }
            .stat-box { padding: 12px 8px; }
            .stat-box .count { font-size: 26px; }
            .filter-btn { padding: 14px 8px; }
            .object-header { padding: 14px; }
            .object-name { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>JSBridge Scanner</h1>
            <p>检测 WebView 中注入的 JS-Native 接口</p>
        </div>

        <div class="stats">
            <div class="stat-box high">
                <span class="count" id="high-count">0</span>
                <span class="label">高风险</span>
            </div>
            <div class="stat-box medium">
                <span class="count" id="medium-count">0</span>
                <span class="label">中风险</span>
            </div>
            <div class="stat-box safe">
                <span class="count" id="safe-count">0</span>
                <span class="label">安全</span>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn all" onclick="filterResults('all')">全部</button>
            <button class="filter-btn high" onclick="filterResults('high')">高风险</button>
            <button class="filter-btn medium" onclick="filterResults('medium')">中风险</button>
            <button class="filter-btn safe" onclick="filterResults('safe')">安全</button>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
    (function() {
        // 浏览器原生属性白名单
        const WHITELIST = [
            "window", "document", "location", "navigator", "history", "screen",
            "parent", "top", "self", "frames", "length", "closed", "opener",
            "name", "origin", "outerHeight", "outerWidth", "innerHeight", "innerWidth",
            "screenX", "screenY", "screenLeft", "screenTop", "devicePixelRatio",
            "alert", "confirm", "prompt", "print", "focus", "blur", "close",
            "postMessage", "open", "setTimeout", "clearTimeout", "setInterval", "clearInterval",
            "requestAnimationFrame", "cancelAnimationFrame", "requestIdleCallback", "cancelIdleCallback",
            "fetch", "XMLHttpRequest", "WebSocket", "EventSource",
            "btoa", "atob", "queueMicrotask", "getComputedStyle", "matchMedia",
            "scroll", "scrollTo", "scrollBy", "scrollX", "scrollY", "pageXOffset", "pageYOffset",
            "moveTo", "moveBy", "resizeTo", "resizeBy", "getSelection", "find", "stop",
            "captureEvents", "releaseEvents", "addEventListener", "removeEventListener", "dispatchEvent",
            "localStorage", "sessionStorage", "indexedDB", "cookieStore", "caches",
            "crypto", "JSON", "Promise", "Proxy", "Reflect", "Map", "Set", "WeakMap", "WeakSet",
            "Object", "Function", "Array", "String", "Number", "Boolean", "Symbol", "BigInt",
            "Math", "Date", "RegExp", "Error", "TypeError", "SyntaxError",
            "URL", "URLSearchParams", "Blob", "File", "FileReader", "FormData",
            "Image", "ImageBitmap", "Canvas", "Audio", "AudioContext",
            "performance", "console", "chrome", "speechSynthesis",
            "visualViewport", "styleMedia", "clientInformation", "external",
            "Node", "Element", "HTMLElement", "Event", "CustomEvent",
            "Worker", "Notification", "Geolocation"
        ];

        // 风险关键词
        const RISK_HIGH = [
            "install", "download", "apk", "exec", "shell", "cmd", "delete",
            "sendsms", "sms", "call", "dial", "pay", "payment", "login", "logout"
        ];
        const RISK_MEDIUM = [
            "open", "start", "launch", "intent", "activity", "device", "imei",
            "location", "gps", "contact", "camera", "video", "audio", "record",
            "file", "clipboard", "notification", "wifi", "bluetooth", "storage"
        ];

        function getRisk(name) {
            const lower = name.toLowerCase();
            if (RISK_HIGH.some(k => lower.includes(k))) return "high";
            if (RISK_MEDIUM.some(k => lower.includes(k))) return "medium";
            return "safe";
        }

        // 扫描 window
        const results = [];
        for (const key in window) {
            if (WHITELIST.includes(key)) continue;
            if (key.startsWith("on") && typeof window[key] === "function") continue;

            const obj = window[key];
            const type = typeof obj;
            const risk = getRisk(key);
            const properties = [];

            if (obj && (type === "object" || type === "function")) {
                try {
                    for (const p in obj) {
                        properties.push({ name: p, type: typeof obj[p], risk: getRisk(p) });
                    }
                } catch (e) {}
            }

            results.push({ name: key, type, risk, properties });
        }

        // 按风险排序
        results.sort((a, b) => {
            const order = { high: 0, medium: 1, safe: 2 };
            return order[a.risk] - order[b.risk];
        });

        // 统计
        const counts = { high: 0, medium: 0, safe: 0 };
        results.forEach(r => counts[r.risk]++);
        document.getElementById("high-count").textContent = counts.high;
        document.getElementById("medium-count").textContent = counts.medium;
        document.getElementById("safe-count").textContent = counts.safe;

        // 渲染
        function render(filter = "all") {
            const container = document.getElementById("results");
            const filtered = filter === "all" ? results : results.filter(r => r.risk === filter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">没有找到匹配的对象</div>';
                return;
            }

            container.innerHTML = filtered.map((item, idx) => `
                <div class="object-item">
                    <div class="object-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div>
                            <span class="object-name ${item.risk}">${item.name}</span>
                            <span class="object-type">${item.type}</span>
                        </div>
                        <div>
                            <span class="risk-badge ${item.risk}">${item.risk.toUpperCase()}</span>
                            <span class="arrow">▼</span>
                        </div>
                    </div>
                    <div class="object-body">
                        ${item.properties.length === 0
                            ? '<div style="color:#888;padding:10px;">无子属性</div>'
                            : item.properties.map(p => `
                                <div class="property">
                                    <span class="property-type">${p.type}</span>
                                    <span class="property-name ${p.risk}">${p.name}</span>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `).join("");
        }

        window.filterResults = render;
        render();
    })();
    </script>
</body>
</html>
