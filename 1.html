<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultimate JSBridge Lab</title>
<style>
    :root {
        --bg: #0a0a10; --card: #13131f; --card-hover: #1c1c2e; --border: #2d2d44;
        --text: #e0e0e0; --text-dim: #8a8a9f;
        --blue: #00e5ff; --red: #ff3366; --yellow: #ffc107; --green: #00e676;
        --purple: #d500f9; --orange: #ff9100;
    }
    [data-theme="light"] {
        --bg: #f0f2f5; --card: #ffffff; --card-hover: #f8f9fa; --border: #dcdfe6;
        --text: #2c3e50; --text-dim: #7f8c8d;
        --blue: #0984e3; --red: #e74c3c; --yellow: #f39c12; --green: #27ae60;
        --purple: #8e44ad; --orange: #d35400;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: var(--card); padding: env(safe-area-inset-top) 15px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; flex-wrap: wrap; gap: 8px;}
    .header h1 { font-size: 16px; color: var(--blue); text-shadow: 0 0 10px rgba(0,229,255,0.3); }
    .bridge-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid var(--blue); background: rgba(0,229,255,0.1); color: var(--blue); }
    
    .btn { padding: 8px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); background: var(--card-hover); color: var(--text); cursor: pointer; transition: 0.1s; display: inline-flex; align-items: center; justify-content: center; text-align: center;}
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: rgba(0, 229, 255, 0.1); border-color: var(--blue); color: var(--blue); }
    .btn.danger { background: rgba(255, 51, 102, 0.1); border-color: var(--red); color: var(--red); }
    .btn.warn { background: rgba(255, 193, 7, 0.1); border-color: var(--yellow); color: var(--yellow); }

    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 13px; font-weight: bold; color: var(--text-dim); border-bottom: 2px solid transparent; cursor: pointer;}
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); background: rgba(0,229,255,0.05);}

    .workspace { display: flex; flex: 1; overflow: hidden; position: relative;}
    .panel { display: none; flex-direction: column; background: var(--bg); width: 100%; height: 100%; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom);}
    .panel.active { display: flex; }
    .panel-title { background: var(--card); padding: 10px 12px; font-weight: bold; color: var(--text); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; position: sticky; top: 0; z-index: 10;}
    .panel-body { padding: 12px; display: flex; flex-direction: column; flex: 1;}

    .env-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .env-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: bold; }
    .env-val { font-family: monospace; font-size: 12px; color: var(--green); word-break: break-all; max-height: 100px; overflow-y: auto; }

    .search-box { width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; outline: none; margin-bottom: 10px; font-family: monospace;}
    .obj-item { padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; cursor: pointer; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; }
    .obj-item.active { border-left-color: var(--blue); background: var(--card-hover); }
    .obj-name { font-family: monospace; font-weight: bold; font-size: 14px; word-break: break-all; }
    .tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; color: #fff; }
    .t-crit { background: var(--red); } .t-high { background: var(--orange); } .t-med { background: var(--yellow); color: #000;} .t-low { background: var(--green); color: #000;} .t-none { background: var(--border); }

    .tree-item { display: flex; align-items: center; gap: 6px; padding: 6px 0; font-size: 13px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.02);}
    .tree-toggle { width: 16px; cursor: pointer; color: var(--text-dim); text-align: center; }
    .tree-key { font-family: monospace; cursor: pointer; font-weight: bold; color: var(--blue); }
    .tree-type { font-size: 10px; color: var(--text-dim); background: var(--card); padding: 2px 4px; border-radius: 2px; }
    .tree-children { margin-left: 18px; display: none; border-left: 1px dashed var(--border); padding-left: 6px;}
    .tree-children.show { display: block; }

    .input-base { width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: monospace; outline: none; margin-bottom: 10px; }
    .input-base:focus { border-color: var(--blue); }
    .control-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; width: 100%;}
    
    .terminal { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 12px; height: 220px; overflow-y: auto; font-family: "Courier New", monospace; font-size: 12px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
    .log-line { margin-bottom: 6px; word-break: break-all; line-height: 1.4;}
    .c-time { color: var(--text-dim); margin-right: 5px; user-select: none;}
    .c-ok { color: var(--green); } .c-err { color: var(--red); } .c-sys { color: var(--blue); } .c-warn { color: var(--yellow); } .c-hook { color: var(--purple); }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: env(safe-area-inset-top) 15px 15px; flex-direction: column;}
    .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; flex: 1; display: flex; flex-direction: column; overflow: hidden; max-width: 800px; margin: 0 auto; width: 100%;}
    .modal-body { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; -webkit-user-select: text; user-select: text; }

    @media (min-width: 900px) {
        .tabs { display: none; }
        .workspace { flex-direction: row; }
        .panel { display: flex !important; border-right: 1px solid var(--border); height: 100%; width: 25%; }
        .panel:last-child { border-right: none; }
    }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>🛡️ Ultimate JSBridge Lab</h1>
        <div style="margin-top:4px;">
            <span class="bridge-badge" id="bridge-badge">识别中...</span>
        </div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="toggleTheme()">🌓</button>
        <button class="btn primary" onclick="__WVS__.export()">📄 导出</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">🌐 环境</div>
    <div class="tab" onclick="switchTab(1)">📦 对象</div>
    <div class="tab" onclick="switchTab(2)">🌳 解析</div>
    <div class="tab" onclick="switchTab(3)">📡 终端</div>
</div>

<div class="workspace">
    <div class="panel active">
        <div class="panel-title">
            <span>🌐 运行环境与被动收集</span>
            <button class="btn" style="padding: 2px 8px;" onclick="location.reload()">强制重载</button>
        </div>
        <div class="panel-body">
            <div class="env-card"><div class="env-label">User-Agent</div><div class="env-val" style="color:var(--text);" id="env-ua"></div></div>
            <div class="env-card"><div class="env-label">Document Cookie</div><div class="env-val" id="env-cookie"></div></div>
            <div class="env-card"><div class="env-label">LocalStorage (Keys)</div><div class="env-val" id="env-ls"></div></div>
            <div class="env-card"><div class="env-label">SessionStorage (Keys)</div><div class="env-val" id="env-ss"></div></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span>📦 注入对象池 (<span id="obj-count">0</span>)</span>
            <button class="btn primary" style="padding: 2px 8px;" onclick="__WVS__.scan()">🔄 重新扫描</button>
        </div>
        <div class="panel-body" style="padding: 10px; display: flex; flex-direction: column; height: 100%;">
            <input type="text" class="search-box" id="search-input" placeholder="搜索对象名称..." oninput="__WVS__.filter()">
            <div id="obj-list" style="flex: 1; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid var(--border);"></div>
            
            <div style="flex-shrink: 0; background: var(--card); padding: 10px; border-radius: 6px; border: 1px solid var(--border);">
                <div style="color:var(--red); font-weight:bold; margin-bottom:8px;">🔥 字典补充探测 (P1)</div>
                <div style="font-size:11px; color:var(--text-dim); margin-bottom:10px; line-height:1.4;">
                    部分原生 API 因属性不可枚举导致自动提取遗漏，在此使用字典进行安全探测。
                </div>
                <div class="control-row" style="margin-bottom:0;">
                    <select id="brute-target" class="input-base" style="margin-bottom:0; flex: 1;"></select>
                    <button class="btn danger" id="btn-brute" onclick="__WVS__.brute()">开始探测</button>
                </div>
                <div id="brute-progress" style="margin-top: 8px; text-align: center; color: var(--blue); font-size: 12px; font-family:monospace; font-weight: bold; display:none;"></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span id="tree-title">🌳 对象深度分析</span>
            <div style="display:flex; gap:6px;">
                <button class="btn" style="padding: 2px 8px;" onclick="expandAll()">展开</button>
                <button class="btn" style="padding: 2px 8px;" onclick="collapseAll()">折叠</button>
            </div>
        </div>
        <div class="panel-body" id="tree-body">
            <div style="text-align:center; padding: 40px; color: var(--text-dim);">👈 请在列表中选择对象</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">
            <span>📡 交互终端 (Terminal)</span>
            <button class="btn danger" style="padding: 2px 8px;" id="btn-hook" onclick="__WVS__.hook()">[P3] 部署 Hook</button>
        </div>
        <div class="panel-body" style="display: flex; flex-direction: column;">
            <div class="terminal" id="term-box"></div>
            
            <div style="flex-shrink: 0;">
                <input type="text" id="exec-path" class="input-base" style="color:var(--green); font-weight:bold;" placeholder="路径 (如: window.obj.func 或 jsbridge://)">
                
                <div class="control-row">
                    <input type="text" id="exec-params" class="input-base" style="margin-bottom:0; flex:1;" placeholder='参数 / Payload (如 {"id":1} 或 "test")'>
                    <label style="font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; white-space: nowrap;">
                        <input type="checkbox" id="use-cb"> Callback
                    </label>
                </div>
                
                <div class="control-row">
                    <button class="btn primary" style="flex: 1;" onclick="__WVS__.execute()">⚡ 发送 Call</button>
                    <button class="btn warn" style="flex: 1;" onclick="__WVS__.fuzz()">🧪 连通探测</button>
                    <button class="btn" style="flex: 1;" onclick="__WVS__.deeplink()">🔗 Deeplink</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="md-modal">
    <div class="modal-content">
        <div style="padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center;">
            <h3 style="color:var(--blue);">渗透报告 (Markdown)</h3>
            <div style="display:flex; gap:8px;">
                <button class="btn primary" onclick="__WVS__.copyReport()">复制</button>
                <button class="btn" onclick="document.getElementById('md-modal').style.display='none'">关闭</button>
            </div>
        </div>
        <div class="modal-body" id="md-body"></div>
    </div>
</div>

<script>
function switchTab(index) {
    if(window.innerWidth > 900) return;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    document.querySelectorAll('.workspace > .panel').forEach((p, i) => p.classList.toggle('active', i === index));
}
function expandAll() { document.querySelectorAll('.tree-children').forEach(el => el.classList.add('show')); document.querySelectorAll('.tree-toggle').forEach(el => el.innerText = '▼'); }
function collapseAll() { document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('show')); document.querySelectorAll('.tree-toggle').forEach(el => el.innerText = '▶'); }
function toggleTheme() { const h = document.documentElement; h.setAttribute("data-theme", h.getAttribute("data-theme") === "light" ? "dark" : "light"); }

window.__WVS__ = (function() {
    const INTERNAL_KEYS = ["switchTab", "expandAll", "collapseAll", "toggleTheme", "__WVS__"];
    const IGNORES = ["apply", "bind", "call", "toString", "length", "name", "prototype", "constructor", "caller", "callee"];
    
    const KNOWLEDGE = [
        { kw: ["exec","eval","shell","system"], cat: "命令执行", r: "t-crit", desc: "可执行系统级命令" },
        { kw: ["pay","alipay","wxpay"], cat: "支付接口", r: "t-crit", desc: "拉起支付结算链路" },
        { kw: ["contact","addressbook"], cat: "通讯录", r: "t-high", desc: "获取用户隐私通讯录" },
        { kw: ["file","readfile","openurl"], cat: "文件/越权", r: "t-high", desc: "读取文件或打开跨域URL" },
        { kw: ["login","token","auth"], cat: "凭证操作", r: "t-high", desc: "操作用户登录凭证" },
        { kw: ["intent","startactivity"], cat: "组件逃逸", r: "t-high", desc: "拉起App内部原生组件" },
        { kw: ["deviceid","imei","mac"], cat: "设备指纹", r: "t-med", desc: "获取设备唯一识别码" },
        { kw: ["location","gps"], cat: "物理定位", r: "t-med", desc: "获取真实GPS坐标" }
    ];
    
    // 探测隐藏 API 用字典
    const BRUTE_DICT = ["getUserInfo","getDeviceId","getToken","pay","getLocation","read","write","download","openUrl","startActivity","getContacts","invoke","execute","call","postMessage","showAddressBook","scanQRCode","closeWindow","setupWebViewJavascriptBridge"];
    
    // 验证 API 连通性测试用的常用参数集合
    const FUZZ_PARAMS = [
        null, undefined, "", 0, 1, true, false,
        "test", "{}", "[]", '{"id":"1"}', '["test"]',
        "http://127.0.0.1", "javascript:alert(1)"
    ];

    let scanData = [];
    let isHooked = false;
    const termBox = document.getElementById('term-box');

    function log(msg, type = 'c-sys') {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.innerHTML = `<span class="c-time">[${time}]</span>${msg}`;
        termBox.appendChild(line);
        termBox.scrollTop = termBox.scrollHeight;
    }
    
    function safeStr(obj) { try { return typeof obj === 'object' && obj !== null ? JSON.stringify(obj) : String(obj); } catch(e) { return "[Object]"; } }
    
    function evalRisk(name) {
        const s = name.toLowerCase();
        for(let r of KNOWLEDGE) { if(r.kw.some(k => s.includes(k))) return r; }
        return { cat: "常规接口", r: "t-none", desc: "自定义业务属性" };
    }

    function resolvePath(pathStr) {
        let t = window; let p = null;
        pathStr.split('.').forEach(k => { p = t; if(t) t = t[k]; });
        return { target: t, parent: p };
    }

    function detectEnvironment() {
        const ua = navigator.userAgent;
        document.getElementById('env-ua').innerText = ua;
        document.getElementById('env-cookie').innerText = document.cookie || "(空)";
        try { document.getElementById('env-ls').innerText = Object.keys(localStorage).join(", ") || "(空)"; } catch(e) { document.getElementById('env-ls').innerText = "跨域受限"; }
        try { document.getElementById('env-ss').innerText = Object.keys(sessionStorage).join(", ") || "(空)"; } catch(e) { document.getElementById('env-ss').innerText = "跨域受限"; }

        let os = "Unknown OS";
        if (/android/i.test(ua)) os = "Android";
        else if (/iphone|ipad|ipod/i.test(ua)) os = "iOS";
        else os = "Browser";

        let fw = "Native Bridge";
        if(window.webkit && window.webkit.messageHandlers) fw = "WKWebView";
        else if(window.WebViewJavascriptBridge || window.JsBridge) fw = "JsBridge Framework";
        else if(window.cordova) fw = "Cordova";
        else if(window.ReactNativeWebView) fw = "React Native";
        
        document.getElementById('bridge-badge').innerText = `${os} | ${fw}`;
        log(`环境探测: ${os} - ${fw}`);
    }

    function scan() {
        let keys = [];
        try {
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            document.body.appendChild(iframe);
            const clean = Object.getOwnPropertyNames(iframe.contentWindow);
            const curr = Object.getOwnPropertyNames(window);
            iframe.remove();
            keys = curr.filter(k => !clean.includes(k) && !k.startsWith("on") && !k.startsWith("_cb_") && !INTERNAL_KEYS.includes(k));
        } catch(e) {
            keys = Object.keys(window).filter(k => !["window","document","location","navigator","localStorage","sessionStorage","console"].includes(k) && !k.startsWith("_cb_") && !INTERNAL_KEYS.includes(k));
        }

        scanData = [];
        let tCount = 0;

        if (window.webkit && window.webkit.messageHandlers) {
            Object.keys(window.webkit.messageHandlers).forEach(h => {
                const mInfo = evalRisk(h);
                scanData.push({ 
                    name: `webkit.messageHandlers.${h}`, objRef: window.webkit.messageHandlers[h], 
                    info: mInfo, maxRisk: mInfo.r,
                    methods: [{ name: "postMessage", type: "function", info: evalRisk("postMessage") }]
                });
                tCount++;
            });
        }
        
        keys.filter(k => k !== "webkit").forEach(key => {
            let obj; try { obj = window[key]; } catch(e) { return; }
            if(typeof obj === "object" || typeof obj === "function") {
                let methods = []; let maxR = "t-none";
                try {
                    let props = Object.getOwnPropertyNames(obj);
                    const proto = Object.getPrototypeOf(obj);
                    if(proto && proto !== Object.prototype && proto !== Function.prototype) props = [...new Set([...props, ...Object.getOwnPropertyNames(proto)])];
                    
                    props.forEach(p => {
                        if(IGNORES.includes(p)) return;
                        let mType; try { mType = typeof obj[p]; } catch(e) { mType = 'unknown'; }
                        const mInfo = evalRisk(p);
                        const levels = {"t-crit": 4, "t-high": 3, "t-med": 2, "t-none": 1};
                        if((levels[mInfo.r]||0) > (levels[maxR]||0)) maxR = mInfo.r;
                        methods.push({ name: p, type: mType, info: mInfo });
                    });
                } catch(e) {}
                scanData.push({ name: key, objRef: obj, info: evalRisk(key), maxRisk: maxR, methods: methods });
                tCount++;
            }
        });

        scanData.sort((a,b) => {
            const lvls = {"t-crit": 0, "t-high": 1, "t-med": 2, "t-none": 3};
            return (lvls[a.maxRisk]||9) - (lvls[b.maxRisk]||9);
        });

        document.getElementById('obj-count').innerText = tCount;
        renderList();
        updateBruteSelect();
        log(`扫描快照更新，捕获原生对象 ${tCount} 个。`, 'c-ok');
    }

    function renderList() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = document.getElementById('obj-list');
        list.innerHTML = "";
        
        scanData.forEach((item, idx) => {
            if(q && !item.name.toLowerCase().includes(q)) return;
            const div = document.createElement('div');
            div.className = 'obj-item';
            div.innerHTML = `<span class="obj-name">${item.name.split('.').pop()}</span><span class="tag ${item.maxRisk}">${item.info.cat}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.obj-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                renderTree(item);
                if(window.innerWidth <= 900) switchTab(2);
            };
            list.appendChild(div);
        });
    }

    function renderTree(item) {
        document.getElementById('tree-title').innerText = `🌳 ${item.name.split('.').pop()}`;
        const container = document.getElementById('tree-body');
        container.innerHTML = "";
        container.appendChild(buildTreeNode(item.objRef, `window.${item.name}`, new WeakSet()));
    }

    function buildTreeNode(obj, path, visited) {
        if(obj && typeof obj === 'object') {
            if(visited.has(obj)) {
                const div = document.createElement('div'); div.className = 'tree-item'; div.innerHTML = '<span class="tree-key">🔄 循环引用</span>'; return div;
            }
            visited.add(obj);
        }

        const wrapper = document.createElement('div');
        const head = document.createElement('div');
        head.className = 'tree-item';
        
        const typeStr = typeof obj;
        const isParent = obj && (typeStr === 'object' || typeStr === 'function');
        
        let toggleHTML = isParent ? `<span class="tree-toggle" onclick="this.parentElement.nextElementSibling.classList.toggle('show'); this.innerText = this.innerText==='▶'?'▼':'▶'">▶</span>` : `<span style="width:16px;"></span>`;
        
        const name = path.split('.').pop();
        const rInfo = evalRisk(name);
        const tagHTML = rInfo.r !== 't-none' ? `<span class="tag ${rInfo.r}">${rInfo.cat}</span>` : '';
        
        let valHTML = "";
        if(!isParent) valHTML = `<span class="tree-val"> = ${safeStr(obj)}</span>`;
        
        let actionHTML = (typeStr === 'function' || path.includes("messageHandlers")) ? 
            `<button class="btn" style="padding:2px 8px; margin-left:auto; font-size:10px;" onclick="__WVS__.loadPath('${path}')">Load</button>` : '';

        head.innerHTML = `${toggleHTML}<span class="tree-key ${typeStr}">${name}</span><span class="tree-type">${typeStr}</span>${tagHTML}${valHTML}${actionHTML}`;
        wrapper.appendChild(head);

        if(isParent) {
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'tree-children';
            try {
                let keys = Object.getOwnPropertyNames(obj);
                const proto = Object.getPrototypeOf(obj);
                if(proto && proto !== Object.prototype && proto !== Function.prototype) keys = [...new Set([...keys, ...Object.getOwnPropertyNames(proto)])];
                
                keys.forEach(k => {
                    if(IGNORES.includes(k)) return;
                    try {
                        const childNode = buildTreeNode(obj[k], `${path}.${k}`, visited);
                        childrenDiv.appendChild(childNode);
                    } catch(e){}
                });
            } catch(e) {}
            wrapper.appendChild(childrenDiv);
        }
        return wrapper;
    }

    function updateBruteSelect() {
        const sel = document.getElementById('brute-target');
        sel.innerHTML = '<option value="">-- 选择探测目标 --</option>';
        scanData.forEach(i => {
            if(typeof i.objRef === 'object' && !i.name.includes("messageHandlers")) {
                sel.innerHTML += `<option value="${i.name}">window.${i.name}</option>`;
            }
        });
    }

    function parseParam(str) {
        if(!str) return undefined;
        if(str === "null") return null;
        if(str === "undefined") return undefined;
        if(str === "true") return true;
        if(str === "false") return false;
        try { return JSON.parse(str); } catch(e) { return str; }
    }

    return {
        init: function() {
            detectEnvironment();
            scan();
        },
        scan: scan,
        filter: renderList,
        
        loadPath: function(path) {
            const cleanPath = path.replace(/ \[.*?\]/g, "");
            document.getElementById('exec-path').value = cleanPath;
            log(`已装载测试路径: ${cleanPath}`, 'c-warn');
            if(window.innerWidth <= 900) switchTab(3);
        },

        execute: function() {
            const path = document.getElementById('exec-path').value.replace("window.", "");
            const pRaw = document.getElementById('exec-params').value.trim();
            const useCb = document.getElementById('use-cb').checked;
            if(!path) return;

            log(`> 发送 Call: ${path}`, 'c-sys');
            try {
                let { target: t, parent: p } = resolvePath(path);
                let args = pRaw ? [parseParam(pRaw)] : [];

                if(path.includes("webkit.messageHandlers")) {
                    t.call(p, args[0]||{});
                    return log(`<- iOS message 已发往底层`, 'c-ok');
                }

                if(typeof t === 'function') {
                    if(useCb) {
                        const cbName = "_cb_" + Date.now();
                        window[cbName] = function(data) {
                            log(`[Callback 返回] ${safeStr(data)}`, 'c-ok');
                            delete window[cbName];
                        };
                        args.push(window[cbName]);
                        t.apply(p, args);
                        log(`<- 已注入临时回调 window.${cbName}，等待响应...`, 'c-warn');
                    } else {
                        const res = t.apply(p, args);
                        log(`<- 返回值: ${res !== undefined ? safeStr(res) : 'undefined'}`, 'c-ok');
                    }
                } else {
                    log(`<- 属性读取: ${safeStr(t)}`, 'c-ok');
                }
            } catch(e) { log(`! 执行异常: ${e.message}`, 'c-err'); }
        },

        // 测试接口参数类型，探测连通性
        fuzz: function() {
            const path = document.getElementById('exec-path').value.replace("window.", "");
            if(!path) return alert("请指定执行路径");
            
            let { target: t, parent: p } = resolvePath(path);
            if(typeof t !== 'function') return log(`目标非函数，无法进行探测`, 'c-err');

            log(`[Fuzz] 开始连通性探测: ${path}`, 'c-warn');
            let success = false;

            function nextFuzz(idx) {
                if (success || idx >= FUZZ_PARAMS.length) {
                    if (!success) log(`[Fuzz] 结束，未找到成功响应的参数类型。`, 'c-err');
                    return;
                }
                let param = FUZZ_PARAMS[idx];
                try {
                    let arg = param;
                    if(param === "null") arg = null; else if(param === "undefined") arg = undefined; else { try{arg=JSON.parse(param);}catch(e){} }
                    
                    t.call(p, arg);
                    log(`🎉 [Fuzz 成功] 接口连通！接受的参数类型为: ${typeof arg} (${safeStr(param)})`, 'c-ok');
                    success = true; 
                } catch(e) {
                    log(`[Fuzz] 参数尝试: ${safeStr(param).substring(0,10)} -> 失败或被拦截`, 'c-sys');
                    setTimeout(() => nextFuzz(idx + 1), 50);
                }
            }
            nextFuzz(0);
        },

        // 补充探测模块：安置于面板1底部
        brute: function() {
            const tName = document.getElementById('brute-target').value;
            if(!tName) return alert("请先选择目标");
            
            let { target: targetObj } = resolvePath(tName);
            if(!targetObj) return log(`[Error] 无法解析目标 ${tName}`, 'c-err');

            const progDiv = document.getElementById('brute-progress');
            progDiv.style.display = "block";
            document.getElementById('btn-brute').disabled = true;
            
            let idx = 0, found = 0;
            log(`[Brute] 开始对 ${tName} 进行字典补充探测...`, 'c-warn');

            let scanItem = scanData.find(i => i.name === tName);

            function step() {
                if(idx >= BRUTE_DICT.length) {
                    document.getElementById('btn-brute').disabled = false;
                    progDiv.innerText = `探测完毕，发现 ${found} 个隐藏入口。`;
                    log(`[Brute] 探测完毕，发现 ${found} 个隐藏入口。`, 'c-ok');
                    renderList();
                    if(document.getElementById('exec-path').value.includes(tName)) renderTree(scanItem);
                    return;
                }
                const mName = BRUTE_DICT[idx];
                progDiv.innerText = `探测进度: .${mName}() [${idx+1}/${BRUTE_DICT.length}]`;
                
                try {
                    if(mName in targetObj && !scanItem.methods.some(m => m.name === mName)) {
                        found++;
                        scanItem.methods.push({ name: mName, type: "function", info: evalRisk(mName) });
                        log(`🎯 命中隐藏接口: .${mName}()`, 'c-hook');
                    }
                } catch(e) {
                    if(!scanItem.methods.some(m => m.name === mName)) {
                        found++;
                        scanItem.methods.push({ name: mName, type: "function", info: evalRisk(mName) });
                        log(`🎯 越权拦截验证存在: .${mName}()`, 'c-err');
                    }
                }
                idx++; setTimeout(step, 10);
            }
            step();
        },

        deeplink: function() {
            let url = document.getElementById('exec-params').value.trim() || document.getElementById('exec-path').value.trim();
            if(!url.includes('://')) return log("! 盲发必须输入完整的 URI Scheme (如 app://)", "c-err");

            log(`> 盲发 Deeplink: ${url}`, 'c-warn');
            const cbName = "_cb_" + Date.now();
            window[cbName] = function(res) { log(`🔥 Scheme回调: ${safeStr(res)}`, "c-hook"); };
            
            const fUrl = url.includes("?") ? `${url}&callback=${cbName}` : `${url}?callback=${cbName}`;
            const iframe = document.createElement("iframe");
            iframe.style.display = "none"; iframe.src = fUrl;
            document.body.appendChild(iframe);
            setTimeout(() => iframe.remove(), 3000);
        },

        hook: function() {
            if(isHooked) return log('Hook 已开启，重置请刷新', 'c-warn');
            let hCount = 0;
            
            scanData.forEach(item => {
                let { target: obj } = resolvePath(item.name);
                if(typeof obj === 'object' && obj !== null) {
                    item.methods.forEach(m => {
                        const cleanName = m.name.replace(/ \[.*?\]/g, "");
                        if(typeof obj[cleanName] === 'function' && !obj[cleanName].__hooked) {
                            try {
                                const orig = obj[cleanName];
                                obj[cleanName] = function(...args) {
                                    log(`[AOP 拦截] <b>${item.name}.${cleanName}</b>( ${args.map(a=>safeStr(a)).join(', ')} )`, 'c-hook');
                                    return orig.apply(this, args);
                                };
                                obj[cleanName].__hooked = true;
                                hCount++;
                            } catch(e){} 
                        }
                    });
                }
            });
            window.addEventListener("message", e => log(`[异步推送] Msg: ${safeStr(e.data)}`, 'c-hook'));
            isHooked = true;
            document.getElementById('btn-hook').innerText = "🛑 AOP Hook 监听中";
            log(`[P3] AOP 部署完成，接管了 ${hCount} 个底层入口。`, 'c-ok');
        },

        export: function() {
            let md = `# JSBridge 安全扫描报告\n\n> **扫描时间:** ${new Date().toLocaleString()}\n> **环境指纹:** ${document.getElementById('bridge-badge').innerText}\n> **UA:** ${navigator.userAgent}\n\n`;
            
            md += `## 注入对象发现 (${scanData.length}个)\n`;
            scanData.forEach(obj => {
                md += `\n### \`window.${obj.name}\` [${obj.info.cat}]\n`;
                if(obj.methods.length > 0) {
                    obj.methods.forEach(m => {
                        md += `- \`.${m.name}()\` ${m.info.r !== 't-none' ? `**(🚨风险: ${m.info.desc})**` : ''}\n`;
                    });
                } else {
                    md += `- *(未自动枚举出子属性，建议使用字典补充探测)*\n`;
                }
            });

            document.getElementById('md-body').innerText = md;
            document.getElementById('md-modal').style.display = 'flex';
        },

        copyReport: function() {
            const ta = document.createElement("textarea");
            ta.value = document.getElementById('md-body').innerText; 
            document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
            alert("Markdown 报告已复制！");
        }
    };
})();

setTimeout(window.__WVS__.init, 400);
</script>
