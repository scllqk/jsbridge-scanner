<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Android JSInterface Lab</title>
<style>
:root {
--bg: #1e1e2e; --card: #2a2a3e; --card-hover: #3a3a4e;
--text: #e0e0e0; --text-dim: #888;
--blue: #4fc3f7; --red: #ef5350; --yellow: #ffb74d; --green: #81c784;
--purple: #ba68c8; --orange: #ff8a65; --border: #404060;
}
[data-theme="light"] {
--bg: #f5f5f5; --card: #ffffff; --card-hover: #e8e8e8;
--text: #333; --text-dim: #666; --border: #ddd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.4; }

.header { background: var(--card); padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.header h1 { font-size: 1em; color: var(--blue); }
.header .desc { font-size: 0.75em; color: var(--text-dim); flex: 1; min-width: 200px; }
.theme-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }

.layout { display: grid; grid-template-columns: 300px 1fr 300px; gap: 0; height: calc(100vh - 50px); }
.panel { background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel:last-child { border-right: none; border-left: 1px solid var(--border); }

.panel-header { padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
.panel-title { font-weight: 600; font-size: 0.85em; color: var(--orange); }
.panel-body { flex: 1; overflow-y: auto; padding: 8px; }

.search-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 0.85em; margin-top: 6px; }

.toolbar { display: flex; gap: 4px; flex-wrap: wrap; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.btn { padding: 4px 8px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text); font-size: 0.75em; cursor: pointer; }
.btn:hover { background: var(--card-hover); }
.btn.primary { background: var(--blue); color: #000; border-color: var(--blue); }
.btn.danger { background: var(--red); color: #fff; border-color: var(--red); }

/* 方法名字典爆破 */
.brute-section { padding: 8px; border-bottom: 1px solid var(--border); background: var(--bg); }
.brute-title { font-size: 0.85em; color: var(--red); margin-bottom: 6px; font-weight: 600; }
.brute-row { display: flex; gap: 4px; align-items: center; }
.brute-progress { font-size: 0.75em; color: var(--text-dim); margin-top: 6px; }
.brute-results { margin-top: 6px; max-height: 120px; overflow-y: auto; font-size: 0.75em; }
.brute-item { padding: 2px 4px; margin: 1px 0; background: var(--card); border-radius: 2px; cursor: pointer; }
.brute-item.found { border-left: 2px solid var(--green); }
.brute-item.error { border-left: 2px solid var(--yellow); }

/* 对象列表 */
.object-item { padding: 6px 8px; margin-bottom: 3px; background: var(--bg); border-radius: 3px; cursor: pointer; border-left: 3px solid transparent; font-size: 0.85em; }
.object-item:hover { background: var(--card-hover); }
.object-item.active { border-left-color: var(--blue); background: var(--card-hover); }
.obj-name { font-weight: 600; font-family: monospace; }
.obj-type { color: var(--text-dim); font-size: 0.8em; margin-left: 4px; }
.obj-tag { font-size: 0.7em; padding: 1px 4px; border-radius: 2px; margin-left: 4px; }
.tag-baseline { background: var(--green); color: #000; }
.tag-risk-high { background: var(--red); color: #fff; }
.tag-risk-medium { background: var(--yellow); color: #000; }
.tag-risk-low { background: var(--green); color: #000; }
.tag-risk-pending { background: var(--purple); color: #fff; }

/* 树形结构 */
.tree-node { margin-left: 0; }
.tree-item { display: flex; align-items: center; gap: 4px; padding: 2px 0; font-size: 0.85em; }
.tree-toggle { width: 14px; cursor: pointer; color: var(--text-dim); font-size: 0.7em; text-align: center; }
.tree-toggle:hover { color: var(--text); }
.tree-key { font-family: monospace; cursor: pointer; }
.tree-key:hover { color: var(--blue); }
.tree-key.function { color: var(--blue); }
.tree-key.object { color: var(--green); }
.tree-type { font-size: 0.7em; color: var(--text-dim); background: var(--card); padding: 0 3px; border-radius: 2px; }
.tree-val { font-size: 0.75em; color: var(--text-dim); max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
.tree-children { margin-left: 16px; display: none; }
.tree-children.show { display: block; }

/* 调用面板 */
.call-section { margin-bottom: 10px; padding: 8px; background: var(--bg); border-radius: 4px; }
.call-label { font-size: 0.75em; color: var(--text-dim); margin-bottom: 4px; }
.call-path { font-family: monospace; color: var(--green); font-size: 0.85em; word-break: break-all; }
.call-input { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--card); color: var(--text); font-family: monospace; font-size: 0.85em; }
.call-row { display: flex; gap: 6px; align-items: center; }
.call-row label { font-size: 0.75em; display: flex; align-items: center; gap: 4px; }
.call-result { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: 3px; font-size: 0.8em; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow: auto; display: none; }
.call-result.show { display: block; }
.call-result.ok { border-left: 3px solid var(--green); }
.call-result.err { border-left: 3px solid var(--red); }

/* Deeplink测试 */
.deeplink-section { padding: 8px; background: var(--bg); border-radius: 4px; margin-top: 10px; }
.deeplink-title { font-size: 0.85em; color: var(--blue); margin-bottom: 8px; }

/* 统计 */
.stats { padding: 8px; border-top: 1px solid var(--border); font-size: 0.75em; color: var(--text-dim); }
.stats span { color: var(--blue); }

/* 移动端 */
@media (max-width: 900px) {
.layout { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
.panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
}

.empty { color: var(--text-dim); text-align: center; padding: 20px; font-size: 0.85em; }
</style>
</head>
<body>
<div class="header">
<h1>🔧 Android JSInterface Lab</h1>
<div class="desc">专门用于检测和测试 Android addJavascriptInterface 暴露给 JS 的对象与方法。</div>
<button class="theme-btn" onclick="toggleTheme()">🌓 切换主题</button>
</div>

<div class="layout">
<!-- 左侧：对象发现 -->
<div class="panel">
<div class="panel-header">
<div class="panel-title">📦 候选对象</div>
<input type="text" class="search-input" id="searchObj" placeholder="搜索对象名、方法名、关键字" oninput="filterList()">
</div>
<div class="toolbar">
<button class="btn primary" onclick="rescan()">🔄 重新扫描</button>
<button class="btn" onclick="expandTreeAll()">展开</button>
<button class="btn" onclick="collapseTreeAll()">折叠</button>
<button class="btn" onclick="exportData()">导出JSON</button>
</div>
<!-- 方法名字典爆破 -->
<div class="brute-section">
<div class="brute-title">🔥 方法名字典爆破</div>
<div class="brute-row">
<select class="call-input" id="bruteTarget" style="width:45%;">
<option value="">选择对象...</option>
</select>
<button class="btn primary" id="bruteBtn" onclick="startBrute()">START</button>
<button class="btn danger" onclick="stopBrute()">STOP</button>
</div>
<div class="brute-progress" id="bruteProgress">就绪，点击 START 开始爆破</div>
<div class="brute-results" id="bruteResults"></div>
</div>
<div class="panel-body" id="objList"></div>
<div class="stats">
非基线对象: <span id="countNonBaseline">0</span> |
已见函数: <span id="countFunctions">0</span>
</div>
</div>

<!-- 中间：浏览树 -->
<div class="panel">
<div class="panel-header"><div class="panel-title" id="treeTitle">对象树浏览</div></div>
<div class="panel-body" id="treeBody">
<div class="empty">选择左侧对象查看浏览树</div>
</div>
</div>

<!-- 右侧：调用器 -->
<div class="panel">
<div class="panel-header"><div class="panel-title">📡 接口调用器</div></div>
<div class="panel-body">
<div class="call-section">
<div class="call-label">裸对象路径</div>
<div class="call-path" id="callPath">-</div>
</div>
<div class="call-section">
<div class="call-label">方法名</div>
<input type="text" class="call-input" id="methodName" placeholder="如: getUserInfo">
</div>
<div class="call-section">
<div class="call-label">调用模式</div>
<select class="call-input" id="callMode" onchange="changeCallMode()">
<option value="manual">手工参数</option>
<option value="string">string: 直接传字符串</option>
<option value="json">json_string: 传JSON字符串</option>
<option value="multi">multi: 多参数数组</option>
</select>
</div>
<div class="call-section">
<div class="call-label">参数内容</div>
<input type="text" class="call-input" id="paramInput" placeholder="如: test 或 {&quot;a&quot;:1}">
<div style="font-size:0.7em;color:var(--text-dim);margin-top:4px;" id="paramHint">直接输入参数值</div>
</div>
<div class="call-section">
<label><input type="checkbox" id="useCallback"> 支持callback</label>
</div>
<button class="btn primary" style="width:100%;margin-top:8px;" onclick="doExecute()">⚡ 执行</button>
<div class="call-result" id="callResult"></div>

<div class="deeplink-section">
<div class="deeplink-title">🔗 URL Scheme / Deeplink 测试</div>
<input type="text" class="call-input" id="deeplinkUrl" placeholder="如: jsbridge://getUserInfo?{}">
<button class="btn" style="width:100%;margin-top:6px;" onclick="testDeeplink()">执行 Deeplink</button>
<div class="call-result" id="deeplinkResult"></div>
</div>
</div>
</div>
</div>

<script>
(function() {
// ===================== 方法名字典 =====================
const METHOD_DICT = [
// 通用方法
"init", "open", "close", "start", "stop", "pause", "resume", "destroy",
"get", "set", "put", "remove", "clear", "has", "contains", "size",
"load", "save", "read", "write", "delete", "update", "insert", "query",
"show", "hide", "display", "render", "refresh", "reload", "update",
"send", "receive", "post", "fetch", "request", "response", "callback",
"on", "off", "emit", "trigger", "bind", "unbind", "addEventListener", "removeEventListener",

// 用户/设备相关
"getUserInfo", "getDeviceInfo", "getUserId", "getUserName", "getUserAvatar",
"getDeviceId", "getDeviceName", "getImei", "getImsi", "getMac", "getIp",
"getLocation", "getPosition", "getGps", "getLatitude", "getLongitude",
"getVersion", "getVersionName", "getVersionCode", "getAppVersion",
"getPlatform", "getOs", "getOsVersion", "getModel", "getBrand",
"getToken", "getAccessToken", "getRefreshToken", "getSessionId",

// 支付/钱包
"pay", "alipay", "wxpay", "unionpay", "paypal", "stripe",
"getBalance", "recharge", "withdraw", "transfer", "refund",
"createOrder", "queryOrder", "cancelOrder", "payOrder",

// 登录/认证
"login", "logout", "signin", "signup", "register", "unregister",
"wxLogin", "qqLogin", "weiboLogin", "appleLogin", "googleLogin", "facebookLogin",
"oauth", "auth", "authorize", "authenticate",
"isLogin", "isLogged", "checkLogin", "checkAuth",

// 分享/社交
"share", "shareTo", "shareToWechat", "shareToWeibo", "shareToQQ",
"shareImage", "shareText", "shareWeb", "shareVideo",

// 相机/相册/文件
"takePhoto", "takePicture", "capturePhoto", "captureImage",
"chooseImage", "choosePhoto", "chooseVideo", "chooseFile",
"upload", "uploadFile", "uploadImage", "uploadVideo",
"download", "downloadFile", "downloadImage",
"saveImage", "saveVideo", "saveToAlbum", "saveToGallery",

// 扫码
"scanQRCode", "scanQr", "scanCode", "scanBarcode", "goScanQRCode",

// 键盘/输入
"showKeyboard", "hideKeyboard", "showInput", "hideInput",
"getInput", "setInput", "clearInput",

// 状态栏/导航
"setStatusBar", "setStatusBarColor", "setStatusBarStyle",
"setNavigationBar", "setNavigationBarColor", "setNavigationBarHidden",
"setTitle", "getTitle", "setSubTitle",
"goBack", "goForward", "goHome", "goTo", "jumpTo", "jumpToOtherApp",
"openBrowser", "openUrl", "openWebview", "openActivity",

// 通知/消息
"showToast", "showAlert", "showConfirm", "showDialog", "showModal",
"showNotification", "showPush", "sendPush",
"showLoading", "hideLoading", "showProgress", "hideProgress",

// 存储
"setStorage", "getStorage", "removeStorage", "clearStorage",
"setCookie", "getCookie", "removeCookie", "clearCookie",
"setLocalStorage", "getLocalStorage", "removeLocalStorage", "clearLocalStorage",
"setSessionStorage", "getSessionStorage", "removeSessionStorage", "clearSessionStorage",

// 剪贴板
"copy", "paste", "setClipboard", "getClipboard", "copyToClipboard", "pasteFromClipboard",

// 联系人
"getContacts", "getContact", "getAddressBook", "pickContact",

// 电话/短信
"call", "dial", "makeCall", "makePhoneCall",
"sendSms", "sendSms", "sendTextMessage",

// 音频/视频
"play", "pause", "stop", "seek", "volume",
"playAudio", "pauseAudio", "stopAudio", "playVideo", "pauseVideo", "stopVideo",
"record", "startRecord", "stopRecord", "recordAudio", "recordVideo",

// 蓝牙/NFC
"startBluetooth", "stopBluetooth", "scanBluetooth", "connectBluetooth",
"startNfc", "stopNfc", "scanNfc", "readNfc", "writeNfc",

// 其他常用
"invoke", "execute", "call", "callNative", "callHandler",
"postMessage", "sendMessage", "dispatchEvent",
"addEventListener", "removeEventListener", "onMessage", "offMessage",
"ready", "init", "destroy", "dispose", "finalize"
];

// ===================== 风险评估知识库 =====================
const RISK_KW = {
high: ["exec","eval","shell","cmd","execute","invoke","runtime","system","install","uninstall","jumpTo","startActivity","openapp","loginauth","wxlogin","oauth","signin","token","contact","addressbook","readfile","writefile","deletefile","openurl","loadurl","intent","pay","alipay","wxpay","wallet"],
medium: ["location","getlocation","geolocation","gps","device","deviceid","imei","getdeviceinfo","softwaretype","userinfo","getuser","account","put","get","storage","sign","cmbsign"],
low: ["camera","photo","takephoto","share","goshare","scan","qrcode","goscancode","keyboard","showkeyboard","hidekeyboard","statusbar","webheight","screen","policy","toast","alert","push","notification"]
};

function getRisk(name) {
var s = name.toLowerCase();
for (var r in RISK_KW) for (var k of RISK_KW[r]) if (s.indexOf(k) !== -1) return r;
return "pending";
}

// ===================== 基线检测 =====================
var baseline = [];
function getBaseline() {
try {
var ifr = document.createElement("iframe");
ifr.style.display = "none";
ifr.src = "about:blank";
document.body.appendChild(ifr);
baseline = Object.keys(ifr.contentWindow);
document.body.removeChild(ifr);
} catch(e) {
baseline = ["window","self","document","location","navigator","history","localStorage","sessionStorage","fetch","setTimeout","setInterval","clearTimeout","clearInterval","console","JSON","Object","Array","String","Number","Boolean","Function","Date","Error","Math","RegExp","Promise","Symbol","Map","Set","WeakMap","WeakSet","Proxy","Reflect","JSON","Intl","WebAssembly"];
}
}
function isBaseline(k) { return baseline.indexOf(k) !== -1; }

// ===================== 扫描 =====================
var objects = [];
var funcCount = 0;

function scan() {
objects = [];
funcCount = 0;
getBaseline();

var ignore = ["toggleTheme","rescan","expandTreeAll","collapseTreeAll","exportData","filterList","selectObj","doExecute","changeCallMode","testDeeplink","getBaseline","scan","getRisk","isBaseline","countProps","renderList","renderTree","doCall","countNonBaseline","countFunctions","startBrute","stopBrute","updateBruteSelect","bruteWorker","foundMethods"];

for (var k in window) {
if (ignore.indexOf(k) !== -1) continue;
try {
var v = window[k];
var t = typeof v;
if (t !== "object" && t !== "function") continue;
var isBase = isBaseline(k);
var risk = isBase ? "baseline" : getRisk(k);
objects.push({ name: k, type: t, baseline: isBase, risk: risk, val: v });

// 统计函数
if (t === "function") funcCount++;
if (t === "object" && v) {
for (var m in v) {
try { if (typeof v[m] === "function") funcCount++; } catch(e) {}
}
}
} catch(e) {}
}

// 排序
var order = { high: 0, medium: 1, low: 2, pending: 3, baseline: 4 };
objects.sort(function(a, b) {
if (a.baseline !== b.baseline) return a.baseline ? 1 : -1;
return order[a.risk] - order[b.risk];
});

renderList();
updateBruteSelect();
}

function renderList() {
var q = (document.getElementById("searchObj").value || "").toLowerCase();
var h = "";
for (var i = 0; i < objects.length; i++) {
var o = objects[i];
if (q && o.name.toLowerCase().indexOf(q) === -1) continue;
h += '<div class="object-item' + (o.baseline ? '' : ' active') + '" onclick="selectObj(' + i + ')">';
h += '<span class="obj-name">' + o.name + '</span>';
h += '<span class="obj-type">' + o.type + '</span>';
if (o.baseline) {
h += '<span class="obj-tag tag-baseline">基线内:true</span>';
} else {
h += '<span class="obj-tag tag-risk-' + o.risk + '">' + o.risk + '</span>';
h += '<span class="obj-tag tag-baseline">基线内:false</span>';
}
h += '</div>';
}
document.getElementById("objList").innerHTML = h || '<div class="empty">无匹配对象</div>';
document.getElementById("countNonBaseline").textContent = objects.filter(function(o) { return !o.baseline; }).length;
document.getElementById("countFunctions").textContent = funcCount;
}

window.filterList = function() { renderList(); };
window.rescan = function() { scan(); };

// ===================== 选择对象，显示树 =====================
var currentObj = null;
window.selectObj = function(idx) {
currentObj = objects[idx];
document.getElementById("treeTitle").textContent = "对象树浏览 - " + currentObj.name;
document.getElementById("callPath").textContent = "window." + currentObj.name;
document.getElementById("methodName").value = "";
document.getElementById("callResult").className = "call-result";

renderTree(currentObj.val, "window." + currentObj.name);
};

function renderTree(obj, path) {
var h = "";
var items = [];

if (obj === null || obj === undefined) {
h = '<div class="tree-item"><span class="tree-key">' + path.split(".").pop() + '</span><span class="tree-type">null</span></div>';
} else if (typeof obj === "function") {
h = renderTreeNode(obj, path, "function");
} else if (typeof obj === "object") {
h = renderTreeNode(obj, path, "object");
} else {
h = '<div class="tree-item"><span class="tree-key">' + path.split(".").pop() + '</span><span class="tree-type">' + typeof obj + '</span><span class="tree-val">' + String(obj) + '</span></div>';
}

document.getElementById("treeBody").innerHTML = h;
}

function renderTreeNode(obj, path, nodeType) {
var name = path.split(".").pop();
var h = '<div class="tree-item">';
h += '<span class="tree-toggle" onclick="toggleTree(this)">▶</span>';
h += '<span class="tree-key ' + nodeType + '" onclick="setPath(\'' + path + '\')">' + name + '</span>';
h += '<span class="tree-type">' + nodeType + '</span>';
h += '</div>';
h += '<div class="tree-children">';

try {
var keys = Object.keys(obj);
for (var i = 0; i < keys.length && i < 100; i++) {
var k = keys[i];
if (["caller","callee","arguments"].indexOf(k) !== -1) continue;
try {
var v = obj[k];
var t = typeof v;
var childPath = path + "." + k;

if (v === null || v === undefined) {
h += '<div class="tree-item" style="margin-left:16px;">';
h += '<span class="tree-key" onclick="setPath(\'' + childPath + '\')">' + k + '</span>';
h += '<span class="tree-type">' + (v === null ? "null" : "undefined") + '</span>';
h += '</div>';
} else if (t === "function") {
h += renderTreeNode(v, childPath, "function");
} else if (t === "object") {
h += renderTreeNode(v, childPath, "object");
} else {
var displayVal = t === "string" ? '"' + String(v).substring(0, 30) + '"' : String(v);
h += '<div class="tree-item" style="margin-left:16px;">';
h += '<span class="tree-key ' + t + '" onclick="setPath(\'' + childPath + '\')">' + k + '</span>';
h += '<span class="tree-type">' + t + '</span>';
h += '<span class="tree-val">' + displayVal + '</span>';
h += '</div>';
}
} catch(e) {}
}
} catch(e) {}

h += '</div>';
return h;
}

window.toggleTree = function(el) {
var children = el.parentNode.nextElementSibling;
if (children) {
children.classList.toggle("show");
el.textContent = children.classList.contains("show") ? "▼" : "▶";
}
};

window.expandTreeAll = function() {
document.querySelectorAll(".tree-children").forEach(function(c) { c.classList.add("show"); });
document.querySelectorAll(".tree-toggle").forEach(function(t) { t.textContent = "▼"; });
};

window.collapseTreeAll = function() {
document.querySelectorAll(".tree-children").forEach(function(c) { c.classList.remove("show"); });
document.querySelectorAll(".tree-toggle").forEach(function(t) { t.textContent = "▶"; });
};

window.setPath = function(path) {
document.getElementById("callPath").textContent = path;
var parts = path.split(".");
document.getElementById("methodName").value = parts[parts.length - 1];
};

// ===================== 方法名字典爆破 =====================
var bruteRunning = false;
var bruteTimer = null;
var foundMethods = [];

window.updateBruteSelect = function() {
var sel = document.getElementById("bruteTarget");
sel.innerHTML = '<option value="">选择对象...</option>';
for (var i = 0; i < objects.length; i++) {
if (!objects[i].baseline && objects[i].type === "object") {
sel.innerHTML += '<option value="' + objects[i].name + '">' + objects[i].name + '</option>';
}
}
};

window.startBrute = function() {
var targetName = document.getElementById("bruteTarget").value;
if (!targetName) {
alert("请先选择一个对象");
return;
}

var targetObj = window[targetName];
if (!targetObj) {
alert("对象不存在: " + targetName);
return;
}

bruteRunning = true;
foundMethods = [];
document.getElementById("bruteBtn").disabled = true;
document.getElementById("bruteProgress").textContent = "正在爆破... 0/" + METHOD_DICT.length;
document.getElementById("bruteResults").innerHTML = "";

var idx = 0;
function bruteWorker() {
if (!bruteRunning || idx >= METHOD_DICT.length) {
document.getElementById("bruteProgress").textContent = "完成! 发现 " + foundMethods.length + " 个方法";
document.getElementById("bruteBtn").disabled = false;
bruteRunning = false;
return;
}

var methodName = METHOD_DICT[idx];
var exists = false;
var risk = "pending";

try {
if (targetObj[methodName] !== undefined) {
exists = true;
risk = getRisk(methodName);
foundMethods.push({ name: methodName, type: typeof targetObj[methodName], risk: risk });

var itemClass = "brute-item found";
if (risk === "high") itemClass += " tag-risk-high";
else if (risk === "medium") itemClass += " tag-risk-medium";
else if (risk === "low") itemClass += " tag-risk-low";

var html = '<div class="' + itemClass + '" onclick="setBruteMethod(\'' + targetName + '\', \'' + methodName + '\')">';
html += '<span style="font-weight:600">' + methodName + '</span>';
html += ' <span style="color:var(--text-dim)">' + typeof targetObj[methodName] + '</span>';
html += ' <span class="obj-tag tag-risk-' + risk + '">' + risk + '</span>';
html += '</div>';
document.getElementById("bruteResults").innerHTML += html;
}
} catch(e) {
// 方法访问出错，跳过
}

idx++;
document.getElementById("bruteProgress").textContent = "正在爆破... " + idx + "/" + METHOD_DICT.length + " (发现: " + foundMethods.length + ")";

if (idx % 10 === 0) {
// 每10个方法稍作延迟，避免卡顿
bruteTimer = setTimeout(bruteWorker, 10);
} else {
bruteWorker();
}
}

bruteWorker();
};

window.stopBrute = function() {
bruteRunning = false;
if (bruteTimer) clearTimeout(bruteTimer);
document.getElementById("bruteProgress").textContent = "已停止，发现 " + foundMethods.length + " 个方法";
document.getElementById("bruteBtn").disabled = false;
};

window.setBruteMethod = function(objName, methodName) {
document.getElementById("callPath").textContent = "window." + objName;
document.getElementById("methodName").value = methodName;
};

// ===================== 执行调用 =====================
window.changeCallMode = function() {
var mode = document.getElementById("callMode").value;
var hint = document.getElementById("paramHint");
var input = document.getElementById("paramInput");

switch(mode) {
case "manual":
hint.textContent = "直接输入参数值";
input.placeholder = '如: test 或 {"a":1}';
break;
case "string":
hint.textContent = "字符串参数";
input.placeholder = "输入字符串内容";
break;
case "json":
hint.textContent = "JSON字符串参数";
input.placeholder = '如: {"a":1,"b":2}';
break;
case "multi":
hint.textContent = "多参数，JSON数组格式";
input.placeholder = '如: ["test", {"a":1}]';
break;
}
};

window.doExecute = function() {
var path = document.getElementById("callPath").textContent;
var methodName = document.getElementById("methodName").value.trim();
var paramStr = document.getElementById("paramInput").value.trim();
var mode = document.getElementById("callMode").value;
var useCallback = document.getElementById("useCallback").checked;

var resultDiv = document.getElementById("callResult");
resultDiv.className = "call-result show";
resultDiv.textContent = "执行中...";

try {
// 解析路径，获取对象
var parts = path.split(".");
var obj = window;
for (var i = 1; i < parts.length; i++) {
obj = obj[parts[i]];
}

// 解析参数
var args = [];
if (paramStr) {
switch(mode) {
case "manual":
try { args = [JSON.parse(paramStr)]; } catch(e) { args = [paramStr]; }
break;
case "string":
args = [paramStr];
break;
case "json":
args = [JSON.parse(paramStr)];
break;
case "multi":
args = JSON.parse(paramStr);
break;
}
}

// 执行
var result;
if (methodName && obj[methodName]) {
if (typeof obj[methodName] === "function") {
if (useCallback) {
var cbName = "_cb_" + Date.now();
window[cbName] = function(data) {
resultDiv.className = "call-result show ok";
try { resultDiv.textContent = "✅ 回调结果:\n" + JSON.stringify(data, null, 2); }
catch(e) { resultDiv.textContent = "✅ 回调结果:\n" + String(data); }
delete window[cbName];
};
args.push(window[cbName]);
obj[methodName].apply(obj, args);
resultDiv.textContent = "⏳ 已发送，等待回调...";
return;
} else {
result = obj[methodName].apply(obj, args);
}
} else {
result = obj[methodName];
}
} else {
result = obj;
}

var resultStr;
try { resultStr = typeof result === "object" ? JSON.stringify(result, null, 2) : String(result); }
catch(e) { resultStr = String(result); }

resultDiv.className = "call-result show ok";
resultDiv.textContent = "✅ 结果:\n" + (resultStr || "(无返回值)");
} catch(e) {
resultDiv.className = "call-result show err";
resultDiv.textContent = "❌ 错误: " + e.message;
}
};

// ===================== Deeplink测试 =====================
window.testDeeplink = function() {
var url = document.getElementById("deeplinkUrl").value.trim();
if (!url) {
document.getElementById("deeplinkResult").className = "call-result show err";
document.getElementById("deeplinkResult").textContent = "请输入URL";
return;
}

var resultDiv = document.getElementById("deeplinkResult");
resultDiv.className = "call-result show";
resultDiv.textContent = "发送中...";

// 创建回调
var cbName = "_dlcb_" + Date.now();
window[cbName] = function(data) {
resultDiv.className = "call-result show ok";
try { resultDiv.textContent = "✅ 响应:\n" + JSON.stringify(data, null, 2); }
catch(e) { resultDiv.textContent = "✅ 响应:\n" + String(data); }
delete window[cbName];
};

// 添加callback参数
var urlWithCb = url;
if (url.indexOf("callback") === -1) {
urlWithCb = url + (url.indexOf("?") === -1 ? "?" : "&") + "callback=" + cbName;
}

// 发送
var iframe = document.createElement("iframe");
iframe.style.display = "none";
iframe.src = urlWithCb;
document.body.appendChild(iframe);

setTimeout(function() {
try { document.body.removeChild(iframe); } catch(e) {}
}, 3000);

resultDiv.textContent = "⏳ 已发送: " + urlWithCb + "\n等待响应...";

// 超时
setTimeout(function() {
if (window[cbName]) {
resultDiv.className = "call-result show err";
resultDiv.textContent = "⏱️ 超时(5秒)，可能:\n- Bridge不存在\n- 原生未实现回调";
delete window[cbName];
}
}, 5000);
};

// ===================== 导出 =====================
window.exportData = function() {
var data = {
scanTime: new Date().toISOString(),
userAgent: navigator.userAgent,
url: location.href,
objects: objects.map(function(o) {
return { name: o.name, type: o.type, baseline: o.baseline, risk: o.risk };
}),
foundMethods: foundMethods
};
var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
var a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "jsinterface-scan-" + Date.now() + ".json";
a.click();
};

// ===================== 主题 =====================
window.toggleTheme = function() {
var html = document.documentElement;
html.setAttribute("data-theme", html.getAttribute("data-theme") === "light" ? "dark" : "light");
localStorage.setItem("jsil-theme", html.getAttribute("data-theme"));
};
var st = localStorage.getItem("jsil-theme");
if (st) document.documentElement.setAttribute("data-theme", st);

// ===================== 初始化 =====================
scan();
})();
</script>
