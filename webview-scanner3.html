<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>JSBridge Security Scanner</title>
<style>
:root {
  --bg: #0a0a10; --card: #13131f; --card-hover: #1c1c2e; --border: #2d2d44;
  --text: #e0e0e0; --text-dim: #8a8a9f;
  --blue: #00e5ff; --red: #ff3366; --yellow: #ffc107; --green: #00e676;
  --purple: #d500f9; --orange: #ff9100;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* 顶部 */
.header { background: var(--card); padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
.header h1 { font-size: 1.1em; color: var(--blue); text-shadow: 0 0 10px rgba(0,229,255,0.3); }
.header-info { font-size: 0.75em; color: var(--text-dim); }
.stats-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.stat-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; background: var(--bg); border: 1px solid var(--border); font-size: 0.8em; }

/* 三栏布局 */
.workspace { display: flex; flex: 1; overflow: hidden; }
.panel { display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); min-width: 0; }
.panel-title { background: var(--card); padding: 10px 12px; font-weight: bold; color: var(--text); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
.panel-content { flex: 1; overflow-y: auto; padding: 10px; }

/* 按钮 */
.btn { padding: 5px 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 0.85em; }
.btn:hover { background: var(--card-hover); border-color: var(--blue); }
.btn.primary { background: rgba(0,229,255,0.1); border-color: var(--blue); color: var(--blue); }
.btn.danger { background: rgba(255,51,102,0.1); border-color: var(--red); color: var(--red); }
.btn.warn { background: rgba(255,193,7,0.1); border-color: var(--yellow); color: var(--yellow); }

/* 输入框 */
.input-base { width: 100%; padding: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: monospace; margin-bottom: 8px; outline: none; font-size: 0.85em; }
.input-base:focus { border-color: var(--blue); }

/* 列表项 */
.list-item { padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: 0.2s; }
.list-item:hover, .list-item.active { border-color: var(--blue); background: var(--card-hover); }
.risk-tag { padding: 2px 6px; border-radius: 3px; font-size: 0.7em; font-weight: bold; margin-left: 6px; color: #fff; }
.r-crit { background: var(--red); }
.r-high { background: var(--orange); }
.r-med { background: var(--yellow); color: #000; }
.r-low { background: var(--green); color: #000; }
.r-none { background: var(--border); }

/* 树形 */
.tree-node { margin-bottom: 3px; }
.tree-header { display: flex; align-items: center; padding: 4px 6px; border-radius: 4px; cursor: pointer; gap: 6px; }
.tree-header:hover { background: var(--card); }
.tree-toggle { width: 16px; color: var(--text-dim); cursor: pointer; font-size: 0.7em; }
.tree-key { color: var(--blue); font-weight: bold; font-size: 0.9em; }
.tree-key.function { color: var(--green); }
.tree-type { color: var(--text-dim); font-size: 0.75em; background: var(--card); padding: 1px 4px; border-radius: 2px; }
.tree-val { color: var(--text-dim); font-size: 0.8em; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
.tree-children { margin-left: 16px; display: none; }
.tree-children.show { display: block; }
.action-btn { font-size: 0.7em; padding: 2px 6px; margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); cursor: pointer; }
.action-btn:hover { background: var(--blue); color: #000; }

/* 终端 */
.terminal { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 8px; flex: 1; overflow-y: auto; font-family: "Courier New", monospace; font-size: 0.8em; margin-bottom: 8px; min-height: 100px; }
.log-line { margin-bottom: 3px; word-break: break-all; line-height: 1.3; }
.log-time { color: var(--text-dim); margin-right: 6px; font-size: 0.9em; }
.log-info { color: var(--green); }
.log-warn { color: var(--yellow); }
.log-err { color: var(--red); }
.log-hook { color: var(--purple); }

/* 爆破区 */
.brute-section { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 10px; }
.brute-title { color: var(--red); font-size: 0.9em; margin-bottom: 8px; font-weight: bold; }
.brute-progress { font-size: 0.75em; color: var(--text-dim); margin-top: 6px; }

/* 空状态 */
.empty { color: var(--text-dim); text-align: center; padding: 30px 15px; font-size: 0.85em; }

/* 弹窗 */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
.modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 15px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; font-size: 0.85em; }

/* Bridge类型徽章 */
.bridge-badge { padding: 3px 8px; border-radius: 3px; font-size: 0.75em; font-weight: bold; }
.bridge-badge.android { background: #3ddc84; color: #000; }
.bridge-badge.ios { background: #007aff; color: #fff; }
.bridge-badge.thirdparty { background: var(--purple); color: #fff; }
.bridge-badge.unknown { background: var(--text-dim); color: #fff; }

/* 移动端适配 */
@media (max-width: 900px) {
  .workspace { flex-direction: column; overflow-y: auto; }
  .panel { border-right: none; border-bottom: 1px solid var(--border); flex: none; }
  .panel:first-child { flex: 0 0 auto; max-height: 35vh; }
  .panel:nth-child(2) { flex: 0 0 auto; max-height: 35vh; }
  .panel:last-child { flex: 1; min-height: 40vh; border-bottom: none; }
  .header { padding: 10px; }
  .header h1 { font-size: 1em; }
  .stat-badge { padding: 3px 6px; font-size: 0.7em; }
  .list-item { padding: 8px; }
  .terminal { min-height: 80px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🛡️ JSBridge Scanner</h1>
    <div class="header-info" id="envInfo">加载中...</div>
  </div>
  <div class="stats-row">
    <span class="bridge-badge unknown" id="bridgeBadge">未识别</span>
    <div class="stat-badge" style="color:var(--red)">高危: <span id="statHigh">0</span></div>
    <div class="stat-badge" style="color:var(--yellow)">中危: <span id="statMed">0</span></div>
    <button class="btn primary" onclick="exportReport()">📄 报告</button>
  </div>
</div>

<div class="workspace">
  <!-- 左侧：对象列表 -->
  <div class="panel" style="width: 280px; flex-shrink: 0;">
    <div class="panel-title">
      <span>📦 注入对象</span>
      <button class="btn" style="padding:2px 6px;font-size:0.8em" onclick="runScan()">🔄</button>
    </div>
    <div class="panel-content">
      <input type="text" class="input-base" id="searchInput" placeholder="搜索对象名..." oninput="filterList()">
      <div id="objectList" style="max-height: calc(100% - 40px); overflow-y: auto;"></div>
      
      <div class="brute-section">
        <div class="brute-title">🔥 方法爆破</div>
        <select class="input-base" id="bruteTarget"><option value="">选择目标...</option></select>
        <button class="btn danger" style="width:100%" id="btnBrute" onclick="startBrute()">开始撞库</button>
        <div class="brute-progress" id="bruteProgress">选择对象后开始爆破</div>
      </div>
    </div>
  </div>

  <!-- 中间：对象树 -->
  <div class="panel" style="flex: 1;">
    <div class="panel-title">
      <span>🌳 对象结构</span>
      <div>
        <button class="btn" style="padding:2px 8px" onclick="expandAll()">展开</button>
        <button class="btn" style="padding:2px 8px" onclick="collapseAll()">折叠</button>
      </div>
    </div>
    <div class="panel-content" id="treeContainer">
      <div class="empty">👈 选择左侧对象查看结构</div>
    </div>
  </div>

  <!-- 右侧：终端 -->
  <div class="panel" style="width: 320px; flex-shrink: 0;">
    <div class="panel-title">
      <span>📡 终端</span>
      <label style="font-size:0.8em"><input type="checkbox" id="enableHook" onchange="toggleHook()"> Hook</label>
    </div>
    <div class="panel-content" style="display:flex; flex-direction: column;">
      <div class="terminal" id="terminal"></div>
      
      <input type="text" class="input-base" id="execPath" placeholder="路径: window.obj.method" style="color:var(--green)">
      <input type="text" class="input-base" id="execParams" placeholder='参数: {"key":"val"} 或 "text"'>
      <div style="display: flex; gap: 6px; margin-bottom: 8px;">
        <button class="btn primary" style="flex:1" onclick="executeCall()">⚡ 调用</button>
        <button class="btn warn" style="flex:1" onclick="runFuzz()">🧪 Fuzz</button>
      </div>
      
      <div class="brute-section" style="margin-top: 8px; background: transparent; border-color: var(--blue);">
        <div style="color:var(--blue); font-size:0.85em; margin-bottom:6px; font-weight:bold;">🔗 Deeplink</div>
        <input type="text" class="input-base" id="deeplinkUrl" placeholder="jsbridge://action">
        <button class="btn" style="width:100%" onclick="testDeeplink()">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- 报告弹窗 -->
<div class="modal" id="reportModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 style="color:var(--blue)">📄 渗透测试报告</h3>
      <div>
        <button class="btn primary" onclick="copyReport()">复制</button>
        <button class="btn" onclick="document.getElementById('reportModal').style.display='none'">关闭</button>
      </div>
    </div>
    <div class="modal-body" id="reportBody"></div>
  </div>
</div>

<script>
(function() {
// 等待DOM加载
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

function init() {
  // 工具方法屏蔽
  const WVS_GLOBALS = ['runScan', 'startBrute', 'stopBrute', 'executeCall', 'runFuzz', 'testDeeplink', 'exportReport', 'copyReport', 'toggleHook', 'expandAll', 'collapseAll', 'filterList'];
  
  // 知识库
  const KNOWLEDGE = {
    exec: { cat: '命令执行', kw: ['exec', 'eval', 'shell', 'cmd', 'invoke', 'runtime', 'system'], risk: 'r-crit', desc: '可能执行系统命令' },
    app: { cat: '应用控制', kw: ['install', 'uninstall', 'downloadapk', 'openapp', 'startactivity'], risk: 'r-crit', desc: '静默安装或拉起应用' },
    pay: { cat: '支付越权', kw: ['pay', 'alipay', 'wxpay', 'wallet', 'createorder'], risk: 'r-crit', desc: '未授权拉起支付' },
    contact: { cat: '隐私窃取', kw: ['contact', 'addressbook', 'getcontacts'], risk: 'r-high', desc: '获取通讯录数据' },
    file: { cat: '文件操作', kw: ['readfile', 'writefile', 'openfile', 'deletefile'], risk: 'r-high', desc: '读写App私有文件' },
    auth: { cat: '认证劫持', kw: ['login', 'oauth', 'token', 'signin', 'gettoken'], risk: 'r-high', desc: '获取登录凭证' },
    intent: { cat: '路由跳转', kw: ['intent', 'openurl', 'jumpto', 'loadurl'], risk: 'r-high', desc: '越权拉起组件' },
    device: { cat: '设备指纹', kw: ['deviceid', 'imei', 'mac', 'serial', 'getdevice'], risk: 'r-med', desc: '获取设备标识' },
    storage: { cat: '数据存储', kw: ['storage', 'setdata', 'getdata', 'save', 'load'], risk: 'r-med', desc: '操作本地存储' },
    location: { cat: '位置信息', kw: ['location', 'gps', 'position', 'getlocation'], risk: 'r-med', desc: '获取物理坐标' },
    media: { cat: '媒体调用', kw: ['camera', 'photo', 'audio', 'record', 'scan'], risk: 'r-low', desc: '调用摄像头麦克风' },
    ui: { cat: '界面交互', kw: ['toast', 'alert', 'navigation', 'statusbar', 'keyboard'], risk: 'r-low', desc: 'UI展示操作' }
  };

  // 爆破字典
  const BRUTE_DICT = [
    'getUserInfo', 'getDeviceInfo', 'getToken', 'getAccessToken', 'login', 'logout',
    'pay', 'alipay', 'wxpay', 'getLocation', 'getContacts', 'getClipboard',
    'openUrl', 'startActivity', 'jumpTo', 'invoke', 'execute', 'call',
    'postMessage', 'sendMessage', 'upload', 'download', 'saveImage',
    'takePhoto', 'scanQRCode', 'showKeyboard', 'hideKeyboard',
    'setStorage', 'getStorage', 'share', 'shareToWechat', 'getImei',
    'getMacAddress', 'readFile', 'writeFile', 'getSimInfo'
  ];

  // 全局状态
  let scanData = [];
  let hookEnabled = false;
  let selectedObj = null;
  const terminal = document.getElementById('terminal');

  // 日志
  function log(msg, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    line.className = 'log-line log-' + type;
    line.innerHTML = '<span class="log-time">[' + time + ']</span> ' + msg;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
    if (terminal.children.length > 100) terminal.removeChild(terminal.firstChild);
  }

  // 安全字符串化
  function safeStr(obj) {
    try { return typeof obj === 'object' ? JSON.stringify(obj) : String(obj); }
    catch(e) { return '[Native Object]'; }
  }

  // 风险评估
  function evalRisk(name) {
    const s = name.toLowerCase();
    for (let k in KNOWLEDGE) {
      if (KNOWLEDGE[k].kw.some(kw => s.includes(kw))) return KNOWLEDGE[k];
    }
    return { cat: '未分类', risk: 'r-none', desc: '需人工确认' };
  }

  // iframe 白名单提取
  function getInjectedKeys() {
    try {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      const cleanKeys = Object.getOwnPropertyNames(iframe.contentWindow);
      const currKeys = Object.getOwnPropertyNames(window);
      iframe.parentNode.removeChild(iframe);
      return currKeys.filter(k =>
        !cleanKeys.includes(k) &&
        !k.startsWith('webkit') &&
        !k.startsWith('on') &&
        !WVS_GLOBALS.includes(k)
      );
    } catch(e) {
      // 降级方案
      const blacklist = ['window','document','location','navigator','localStorage','sessionStorage','console','fetch','XMLHttpRequest','setTimeout','setInterval','clearTimeout','clearInterval','JSON','Object','Array','String','Number','Boolean','Function','Symbol','Map','Set','WeakMap','WeakSet','Promise','Proxy','Reflect','Error','Date','RegExp','Math','parseInt','parseFloat','isNaN','isFinite','encodeURI','decodeURI','encodeURIComponent','decodeURIComponent','escape','unescape','eval','uneval','Infinity','NaN','undefined','NaN','alert','confirm','prompt','print','scroll','scrollBy','scrollTo','getSelection','getComputedStyle','matchMedia'];
      return Object.getOwnPropertyNames(window).filter(k => !blacklist.includes(k) && !WVS_GLOBALS.includes(k));
    }
  }

  // 扫描
  window.runScan = function() {
    log('开始扫描注入对象...', 'warn');
    scanData = [];
    const keys = getInjectedKeys();
    
    let stats = { total: 0, high: 0, med: 0 };
    
    keys.forEach(key => {
      let obj;
      try { obj = window[key]; } catch(e) { return; }
      
      const type = typeof obj;
      if (type !== 'object' && type !== 'function') return;
      
      let methods = [];
      let maxRisk = 'r-none';
      const objInfo = evalRisk(key);
      
      if (obj) {
        try {
          let props = Object.getOwnPropertyNames(obj);
          // 检查原型链
          const proto = Object.getPrototypeOf(obj);
          if (proto && proto !== Object.prototype && proto !== Function.prototype) {
            props = [...new Set([...props, ...Object.getOwnPropertyNames(proto)])];
          }
          
          props.forEach(p => {
            if (['apply','bind','call','toString','length','name','prototype','constructor','caller','callee'].includes(p)) return;
            let mType;
            try { mType = typeof obj[p]; } catch(e) { mType = 'unknown'; }
            
            const mInfo = evalRisk(p);
            const levels = { 'r-crit': 4, 'r-high': 3, 'r-med': 2, 'r-low': 1, 'r-none': 0 };
            if (levels[mInfo.risk] > levels[maxRisk]) maxRisk = mInfo.risk;
            
            methods.push({ name: p, type: mType, info: mInfo });
          });
        } catch(e) {}
      }
      
      stats.total++;
      if (['r-crit', 'r-high'].includes(maxRisk)) stats.high++;
      if (maxRisk === 'r-med') stats.med++;
      
      scanData.push({ name: key, type: type, info: objInfo, maxRisk: maxRisk, methods: methods, val: obj });
    });
    
    // 排序
    scanData.sort((a, b) => {
      const levels = { 'r-crit': 0, 'r-high': 1, 'r-med': 2, 'r-low': 3, 'r-none': 4 };
      return levels[a.maxRisk] - levels[b.maxRisk];
    });
    
    document.getElementById('statHigh').textContent = stats.high;
    document.getElementById('statMed').textContent = stats.med;
    
    detectBridge();
    renderList();
    log('扫描完成: 发现 ' + stats.total + 个对象', 'info');
  };

  // Bridge检测
  function detectBridge() {
    let type = 'unknown';
    let info = '';
    
    if (window.webkit && window.webkit.messageHandlers) {
      type = 'ios';
      info = 'WKWebView';
    } else if (window.JsBridge || window.JSBridge) {
      type = 'thirdparty';
      info = 'JsBridge';
    } else if (window.WebViewJavascriptBridge) {
      type = 'thirdparty';
      info = 'WebViewJavascriptBridge';
    } else if (window.cordova) {
      type = 'thirdparty';
      info = 'Cordova';
    } else if (window.ReactNativeWebView) {
      type = 'thirdparty';
      info = 'ReactNative';
    }
    
    if (type === 'unknown') {
      for (let i = 0; i < scanData.length; i++) {
        const n = scanData[i].name.toLowerCase();
        if (n.includes('android') || n.includes('java') || n.includes('jsi')) {
          type = 'android';
          info = 'addJavascriptInterface';
          break;
        }
      }
    }
    
    const badge = document.getElementById('bridgeBadge');
    badge.textContent = info || type;
    badge.className = 'bridge-badge ' + type;
  }

  // 渲染列表
  function renderList() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const container = document.getElementById('objectList');
    const sel = document.getElementById('bruteTarget');
    container.innerHTML = '';
    sel.innerHTML = '<option value="">选择目标...</option>';
    
    scanData.forEach((item, idx) => {
      if (q && !item.name.toLowerCase().includes(q)) return;
      
      sel.innerHTML += '<option value="' + item.name + '">' + item.name + '</option>';
      
      const div = document.createElement('div');
      div.className = 'list-item';
      div.innerHTML = 
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-weight:bold;color:var(--blue)">.' + item.name + '</span>' +
          '<span class="risk-tag ' + item.maxRisk + '">' + item.info.cat + '</span>' +
        '</div>' +
        '<div style="font-size:0.75em;color:var(--text-dim);margin-top:3px">方法: ' + item.methods.length + ' | ' + item.type + '</div>';
      div.onclick = () => selectObject(idx);
      container.appendChild(div);
    });
    
    if (container.children.length === 0) {
      container.innerHTML = '<div class="empty">无匹配对象</div>';
    }
  }
  window.filterList = renderList;

  // 选择对象
  function selectObject(idx) {
    selectedObj = scanData[idx];
    
    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
    if (event && event.currentTarget) event.currentTarget.classList.add('active');
    
    const container = document.getElementById('treeContainer');
    
    if (selectedObj.methods.length === 0) {
      container.innerHTML = '<div class="empty">⚠️ 此对象无暴露方法<br><br>建议使用左侧<strong>方法爆破</strong>探测隐藏接口</div>';
    } else {
      renderTree(selectedObj, container);
    }
    
    document.getElementById('execPath').value = 'window.' + selectedObj.name;
    log('选中: window.' + selectedObj.name, 'info');
  }

  // 渲染树（循环引用保护）
  function renderTree(obj, container, visited) {
    if (!visited) visited = new WeakSet();
    
    let html = '<div style="color:var(--orange);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">window.' + obj.name + ' <span style="font-size:0.7em;color:var(--text-dim)">[' + obj.type + ']</span></div>';
    
    obj.methods.forEach(m => {
      const realName = m.name.replace(/ \[.*\]/g, '');
      html += 
        '<div class="tree-node">' +
          '<div class="tree-header">' +
            '<span class="tree-key function">.' + m.name + '</span>' +
            '<span class="tree-type">' + m.type + '</span>' +
            (m.info.risk !== 'r-none' && m.info.risk !== 'r-low' ? '<span class="risk-tag ' + m.info.risk + '">' + m.info.cat + '</span>' : '') +
            '<button class="action-btn" onclick="loadToExec(\'window.' + obj.name + '.' + realName + '\')">装载</button>' +
          '</div>' +
        '</div>';
    });
    
    container.innerHTML = html;
  }
  window.loadToExec = function(path) {
    document.getElementById('execPath').value = path;
    log('装载: ' + path, 'info');
  };

  window.expandAll = function() {
    document.querySelectorAll('.tree-children').forEach(c => c.classList.add('show'));
  };
  window.collapseAll = function() {
    document.querySelectorAll('.tree-children').forEach(c => c.classList.remove('show'));
  };

  // 爆破
  window.startBrute = function() {
    const targetName = document.getElementById('bruteTarget').value;
    if (!targetName) { log('请先选择目标对象', 'err'); return; }
    
    let targetObj;
    try { targetObj = window[targetName]; } catch(e) { return; }
    
    const btn = document.getElementById('btnBrute');
    const prog = document.getElementById('bruteProgress');
    btn.disabled = true;
    
    let idx = 0, found = 0;
    const scanItem = scanData.find(i => i.name === targetName);
    if (!scanItem) return;
    
    log('💀 开始爆破 window.' + targetName + '...', 'warn');
    
    function step() {
      if (idx >= BRUTE_DICT.length) {
        btn.disabled = false;
        prog.textContent = '完成! 发现 ' + found + ' 个隐藏方法';
        log('爆破完成: +' + found + ' 个方法', 'info');
        if (selectedObj && selectedObj.name === targetName) selectObject(scanData.indexOf(scanItem));
        return;
      }
      
      const method = BRUTE_DICT[idx];
      prog.textContent = '探测: ' + method + ' (' + (idx+1) + '/' + BRUTE_DICT.length + ')';
      
      try {
        // 使用 in 避免触发 getter
        if (method in targetObj && !scanItem.methods.some(m => m.name.includes(method))) {
          found++;
          scanItem.methods.push({ name: method + ' [爆破]', type: typeof targetObj[method], info: evalRisk(method) });
          log('🎯 发现: .' + method + '()', 'hook');
        }
      } catch(e) {}
      
      idx++;
      setTimeout(step, 5);
    }
    step();
  };

  // 执行调用
  window.executeCall = function() {
    const path = document.getElementById('execPath').value.replace('window.', '');
    const params = document.getElementById('execParams').value;
    
    if (!path) { log('请输入路径', 'err'); return; }
    log('> ' + path + '(' + (params || '') + ')', 'info');
    
    try {
      let target = window, parent = null;
      path.split('.').forEach(p => { parent = target; target = target[p]; });
      
      if (typeof target === 'function') {
        let args = [];
        if (params) {
          try { args = [JSON.parse(params)]; } catch(e) { args = [params]; }
        }
        const res = target.apply(parent, args);
        log('< ' + (res !== undefined ? safeStr(res) : 'undefined'), 'info');
      } else {
        log('< ' + safeStr(target), 'info');
      }
    } catch(e) {
      log('! 错误: ' + e.message, 'err');
    }
  };

  // Fuzz
  window.runFuzz = function() {
    const path = document.getElementById('execPath').value.replace('window.', '');
    if (!path) { log('请先选择方法', 'err'); return; }
    
    const fuzzParams = ['', 'test', '123', '{}', '[]', 'null', '{"a":1}', '["x","y"]'];
    log('🧪 Fuzz测试: ' + path, 'warn');
    
    try {
      let target = window, parent = null;
      path.split('.').forEach(p => { parent = target; target = target[p]; });
      
      if (typeof target !== 'function') { log('目标不是函数', 'err'); return; }
      
      fuzzParams.forEach((p, i) => {
        try {
          let args = [];
          if (p) {
            if (p === 'null') args = [null];
            else try { args = [JSON.parse(p)]; } catch(e) { args = [p]; }
          }
          const res = target.apply(parent, args);
          log('✅ ' + (p || '(empty)') + ' → ' + (res !== undefined ? safeStr(res).substring(0,50) : 'void'), 'info');
        } catch(e) {
          log('❌ ' + (p || '(empty)') + ' → ' + e.message, 'err');
        }
      });
    } catch(e) {
      log('错误: ' + e.message, 'err');
    }
  };

  // Deeplink
  window.testDeeplink = function() {
    let url = document.getElementById('deeplinkUrl').value.trim();
    if (!url) { log('请输入Deeplink', 'err'); return; }
    if (!url.includes('://')) { log('无效的URL格式', 'err'); return; }
    
    log('> Deeplink: ' + url, 'warn');
    
    const cbName = '_dlcb_' + Date.now();
    window[cbName] = function(res) {
      log('🔥 回调: ' + safeStr(res), 'hook');
      delete window[cbName];
    };
    
    const finalUrl = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = finalUrl;
    document.body.appendChild(iframe);
    setTimeout(() => { try { iframe.parentNode.removeChild(iframe); } catch(e) {} }, 3000);
    
    setTimeout(() => {
      if (window[cbName]) {
        log('⏱️ 超时(5秒)', 'err');
        delete window[cbName];
      }
    }, 5000);
  };

  // Hook
  window.toggleHook = function() {
    hookEnabled = document.getElementById('enableHook').checked;
    if (!hookEnabled) { log('Hook已禁用', 'info'); return; }
    
    let count = 0;
    scanData.forEach(objData => {
      let target;
      try { target = window[objData.name]; } catch(e) { return; }
      
      if (typeof target === 'object' && target !== null) {
        objData.methods.forEach(m => {
          const realName = m.name.replace(/ \[.*\]/g, '');
          if (typeof target[realName] === 'function' && !target[realName].__hooked) {
            try {
              const original = target[realName];
              target[realName] = function() {
                if (hookEnabled) {
                  log('[Hook] ' + objData.name + '.' + realName + '(' + Array.from(arguments).map(safeStr).join(', ') + ')', 'hook');
                }
                return original.apply(this, arguments);
              };
              target[realName].__hooked = true;
              count++;
            } catch(e) {}
          }
        });
      }
    });
    
    log('Hook已启用: ' + count + ' 个方法被代理', 'info');
  };

  // 导出报告
  window.exportReport = function() {
    let md = '# JSBridge 安全扫描报告\n\n';
    md += '> **扫描时间:** ' + new Date().toLocaleString() + '\n';
    md += '> **目标页面:** `' + location.href + '`\n';
    md += '> **User-Agent:** `' + navigator.userAgent + '`\n\n';
    
    let crit = 0, high = 0, med = 0, low = 0;
    scanData.forEach(obj => {
      obj.methods.forEach(m => {
        if (m.info.risk === 'r-crit') crit++;
        else if (m.info.risk === 'r-high') high++;
        else if (m.info.risk === 'r-med') med++;
        else low++;
      });
    });
    
    md += '## 风险统计\n';
    md += '- **严重:** ' + crit + '\n';
    md += '- **高危:** ' + high + '\n';
    md += '- **中危:** ' + med + '\n';
    md += '- **低危/未知:** ' + low + '\n\n';
    
    md += '## 高危接口\n';
    scanData.forEach(obj => {
      obj.methods.forEach(m => {
        if (m.info.risk === 'r-crit' || m.info.risk === 'r-high') {
          const realName = m.name.replace(/ \[.*\]/g, '');
          md += '\n### [' + (m.info.risk === 'r-crit' ? 'CRITICAL' : 'HIGH') + '] ' + m.info.cat + '\n';
          md += '> ' + m.info.desc + '\n\n';
          md += '```javascript\nwindow.' + obj.name + '.' + realName + '()\n```\n';
        }
      });
    });
    
    md += '\n## 所有接口\n';
    scanData.forEach(obj => {
      md += '\n### window.' + obj.name + '\n';
      md += '- **分类:** ' + obj.info.cat + '\n';
      if (obj.methods.length > 0) {
        md += '- **方法:**\n';
        obj.methods.forEach(m => {
          md += '  - `.' + m.name + '` ' + (m.info.risk !== 'r-none' && m.info.risk !== 'r-low' ? '⚠️ **' + m.info.cat + '**' : '') + '\n';
        });
      }
    });
    
    document.getElementById('reportBody').textContent = md;
    document.getElementById('reportModal').style.display = 'flex';
  };

  window.copyReport = function() {
    const text = document.getElementById('reportBody').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        log('报告已复制', 'info');
        document.getElementById('reportModal').style.display = 'none';
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      log('报告已复制', 'info');
      document.getElementById('reportModal').style.display = 'none';
    }
  };

  // 初始化
  document.getElementById('envInfo').textContent = navigator.userAgent.split(')')[0] + ')';
  log('Scanner 初始化完成', 'info');
  runScan();
}
})();
</script>
</body>
